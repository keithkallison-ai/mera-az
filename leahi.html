[data-theme=light] .lgrid th,[data-theme=light] .lgrid td{border-color:#e6e9ef}

[data-theme=light] .lgrid .lrl{background:#f0f2f6}
.lgrid td.cell{color:var(--tx3);min-width:58px;max-width:150px;overflow:hidden;text-overflow:ellipsis;transition:background .18s}

/* every lens's legend is built ONCE and lives in the DOM; switching lens toggles which set is shown.
   Rebuilding the chip row's innerHTML on each switch cost a parse + style + layout on the click. */
/* All four lens legends are STACKED IN ONE GRID CELL and only the active one is visible. Toggling display:none
   was ADDING AND REMOVING the whole chip set from layout on every switch (Chrome's invalidation trace: 96 text
   nodes + 40 buttons + 34 chips "Added/Removed from layout"). visibility costs no layout at all. */
.llegend{display:grid;align-items:center;margin:0;flex:1 1 0;min-width:0}   /* takes the rest of the row so the LEGEND label stays inline */
/* EVERY lens's legend is the same height. The flag chips carry ▲▼ and are 40px tall; the type/fill chips are
   ~24px. That 20px difference moved the grid, the minimap and everything below it on every lens switch, AND
   changed the pane's scrollHeight — which retriggers the carousel's ResizeObserver -> fit() -> a forced layout
   of the whole audit pane. A UI that jumps when you click reads as lag. Pin the height: nothing moves. */
.lgset{grid-area:1/1;display:flex;align-items:center;flex-wrap:wrap;gap:9px 12px;font-size:11px;color:var(--tx2);min-height:40px;visibility:hidden}
.lgset.on{visibility:visible}
.llegend span{display:flex;align-items:center;gap:6px}
.llegend i{width:11px;height:11px;border-radius:3px;flex:0 0 auto;border:1px solid var(--line2)}
.llegend b{font-family:JetBrains Mono,monospace;color:var(--tx);font-weight:700;font-size:11px}
/* NO transition on the selected state — a chip must light up the instant it is clicked (a 120ms fade reads as lag).
   contain:paint — without it, hovering a chip made Chrome re-record the display list for the ENTIRE audit pane
   (7.8M px2), once per mouse move. Containment bounds the invalidation to the chip itself. */
.lgd.sel{cursor:pointer;border:1px solid transparent;border-radius:8px;padding:2px 5px 2px 7px;user-select:none;contain:paint}
.lgd.sel:hover{background:rgba(255,255,255,.05)}
[data-theme=light] .lgd.sel:hover{background:rgba(16,24,40,.05)}
.lgd.sel.solo{border-color:var(--fc);background:color-mix(in srgb,var(--fc) 18%,transparent)}
/* the ▲▼ live in the chip and are ALWAYS present — inert until their flag is selected, so nothing has to appear */
/* two classes, so this beats `.llegend span` (1 class + 1 element) — that rule was forcing a 6px gap into the stack */
.llegend .jbtns{display:inline-flex;flex-direction:column;gap:2px;margin-left:5px;vertical-align:middle;opacity:.22;pointer-events:none}
.lgd.walk.solo .jbtns{opacity:1;pointer-events:auto}
.jbtn{background:#141b28;border:1px solid var(--line2);color:var(--tx2);border-radius:4px;width:28px;height:16px;cursor:pointer;font-size:9px;line-height:1;transition:border-color .1s,color .1s,background .1s;padding:0;display:flex;align-items:center;justify-content:center;contain:paint}
.jbtn:hover{border-color:#FF5A1F;color:#FF5A1F}
.jbtn:active{background:#FF5A1F;color:#0b0e13;border-color:#FF5A1F}
[data-theme=light] .jbtn{background:#eef2f7}
[data-theme=light] .jbtn:active{color:#fff}
/* ⛔ The card and the tip are moved on EVERY mouse move. Positioned with left/top and toggled with display, each
   move forced a layout + a PAINT OF THE WHOLE AUDIT PANE (measured: every Paint event was 1512x5167 = 7.8M px2,
   the entire pane, ~35 of them per interaction). They are now always laid out, promoted to their own compositing
   layer, hidden with visibility, and moved with transform — so a move is a compositor job: no layout, no paint. */
.evcard{position:fixed;left:0;top:0;visibility:hidden;z-index:10000;pointer-events:none;max-width:322px;background:#0d1119;border:1px solid var(--line2);border-radius:13px;padding:13px 15px;box-shadow:0 18px 50px rgba(0,0,0,.5);opacity:0;transition:opacity .1s;will-change:transform,opacity;transform:translate3d(0,0,0);contain:layout paint}
[data-theme=light] .evcard{background:#fff;box-shadow:0 18px 50px rgba(16,24,40,.16)}
.evh{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:var(--tx);letter-spacing:-.01em}
.evh i{width:11px;height:11px;border-radius:3px;background:var(--ec);flex:0 0 auto}
.evw{font-family:JetBrains Mono,monospace;font-size:12.5px;font-weight:700;color:var(--tx);margin:8px 0 6px}
.evwhy{font-size:12px;color:var(--tx2);line-height:1.5}
.evp{display:flex;flex-direction:column;gap:3px;margin:10px 0 4px;border-top:1px solid var(--line);padding-top:9px}
.evpr{display:flex;justify-content:space-between;gap:14px;font-size:11.5px}
.evpr b{color:var(--tx3);font-weight:600}

/* BOTH portraits ship in the DOM and decode once at load; a lens switch just flips opacity. Re-assigning
   pimg.src on every switch forced a fresh PNG decode — a lens change must not wait on an image.
   will-change:opacity is NOT cosmetic: without it these two 714x900 PNGs (drawn into a ~150px rail) get
   RE-RASTERED on every opacity flip, on the main thread. MEASURED at 6x CPU throttle: removing the portraits
   entirely cut the worst-case lens switch from 128ms to 80ms. Promoting them to their own compositing layer
   makes the flip a compositor job — zero raster, zero main-thread work. It was the last real cost in a switch. */

    // by ±1/255 at fractional dpr. A rect FILL's coverage is analytic — identical wherever it lands. (Also crisper, and
    // it drops a strokeStyle+lineWidth+beginPath+stroke per row.) The +2 overshoots the right edge for the same reason
    // the clear does: a fill that stops exactly at CSS x=w leaves the last device column a partial blend at dpr 1.25/1.5.
    SCROLLED();                                                        // ---- the grid content
    for(let o=first;o<=last;o++){ const y=RB(o), ty=y+RH/2+0.5;
      if(o&1){ ctx.fillStyle=T.zb; ctx.fillRect(GUT,y,w-GUT+2,RH); }
      for(let j=0;j<CW.length;j++){ const x=XOFF[j]-sl; if(x>w||x+CW[j]<GUT) continue;
        const id=GCOL[j](o); if(id===0) continue; const v=G.cols[j].dv[id-1];
        const fc=fm.get(o*64+j)||0, cc=cm.get(o*64+j)||0; let tc=T.tx, bg=null;
        if(curLens==='fill') bg='rgba(94,234,212,.13)';
        else if(curLens==='type'){ const gk=TGRP[GCT[j]]; if(gk&&isOn(gk)) bg=TBG[GCT[j]]; }
        else if(curLens==='flag'){ if(fc && isOn(FLAGS[fc])){ bg=FBG[FLAGS[fc]]; if(FTX[FLAGS[fc]])tc=FTX[FLAGS[fc]]; } }
        else if(curLens==='claims'){ if(cc && isOn(CLM[cc])){ bg=CBG[CLM[cc]]; if(CTX[CLM[cc]])tc=CTX[CLM[cc]]; } }
        const cx=Math.max(GUT,x), cwj=x+CW[j]-cx; if(cwj<=0) continue;
        if(bg){ ctx.fillStyle=bg; ctx.fillRect(cx,y,cwj,RH-1); }
        ctx.fillStyle=tc;
        if(MONO && x>=GUT && RH>=16 && v.length*CHW<=CW[j]-10) ctx.fillText(v,x+7,ty);               // provably fits: no clip needed
        else { ctx.save(); ctx.beginPath(); ctx.rect(cx,y,cwj,RH); ctx.clip(); ctx.fillText(v,x+7,ty); ctx.restore(); }
      }
    }
    // DEVICE — the row rules, snapped to WHOLE device rows. In CSS space a 1px rule straddles two device rows 50/50 at
    // dpr 1.5, and Skia dithers that split along x with a pattern keyed to (x,y): the blit TRANSLATES that pattern, a
    // redraw REGENERATES it in place, and they disagree by 1/255. Snapped, coverage is 0 or 1 — no dither to disagree
    // about — and exact under any shift, since round(K*dpr) - stD is integer arithmetic. Crisp instead of grey, too.
    { DEVICE(); ctx.fillStyle=T.gl;
      const gx=Math.round(GUT*dpr), gw=CVW-gx, lw=Math.max(1,Math.round(dpr));
      for(let o=first;o<=last;o++){ const gy=Math.round((HDR+(o+1)*RH)*dpr)-stD; ctx.fillRect(gx,gy-lw,gw,lw); } }
    // SCROLLED — the focus ring: the exact footprint of strokeRect(fcx+1,fy+1.5,fcw-2,RH-3) @ lineWidth 2, as four fills
    SCROLLED();
    if(focusCell){ const fo=focusCell.o, fj=focusCell.j; if(fo>=first&&fo<=last){ const fx=XOFF[fj]-sl, fy=RB(fo), fcx=Math.max(GUT,fx), fcw=fx+CW[fj]-fcx;
      if(fcw>0){ ctx.fillStyle='#FF5A1F'; const by=fy+0.5, bh=RH-1;
        ctx.fillRect(fcx,by,fcw,2); ctx.fillRect(fcx,by+bh-2,fcw,2); ctx.fillRect(fcx,by+2,2,bh-4); ctx.fillRect(fcx+fcw-2,by+2,2,bh-4); } } }
    // FIXED — the gutter's background. +2 overshoots the canvas edge: a fill that stops exactly at CSS y=h leaves the
    // last device row a partial blend at dpr 1.25/1.5, which the blit (a whole-row copy) can never reproduce.
    FIXED(); ctx.fillStyle=T.hb; ctx.fillRect(0,HDR,GUT,h-HDR+2);
    // SCROLLED — the row numbers ride with the rows
    SCROLLED(); ctx.textAlign='right'; ctx.font='11px "JetBrains Mono",monospace'; ctx.fillStyle=T.t3;
    for(let o=first;o<=last;o++){ ctx.fillText((o).toLocaleString(),GUT-9,RB(o)+RH/2+0.5); }
    // the gutter's right rule, snapped to WHOLE device columns. In CSS space it sits at x=83, which is device x=124.5
    // at dpr 1.5 — a half-covered column, and Skia dithers those per scanline: a pattern the blit TRANSLATES and a
    // redraw REGENERATES in place, so the two disagree by 1/255. Snapped, it is exact — and crisper.
    ctx.textAlign='left'; DEVICE(); ctx.fillStyle=T.gl;
    { const a=Math.round((GUT-1)*dpr), b=Math.round(GUT*dpr); ctx.fillRect(a,0,Math.max(1,b-a),CH); }
    FIXED();
    // The header lives entirely above device row HD and does not move on a vertical scroll, so the blit left it
    // pixel-perfect and untouched. Only the full-redraw path repaints it — outside the grid clip.
    ctx.restore(); FIXED();
    if(!band){
    ctx.fillStyle=T.hb; ctx.fillRect(0,0,w+2,HDR);
    ctx.textAlign='center'; ctx.font='bold 9px Inter,sans-serif';
    { let rc=0; for(let k=0;k<GREG.length;k++){ const span=GREG[k][1], x0=XOFF[rc]-sl, x1=(rc+span<XOFF.length?XOFF[rc+span]:TOTW)-sl; rc+=span;
        const cx=Math.max(GUT,x0); if(x1<=GUT||x0>w) continue;
        ctx.fillStyle=(GREG[k][2].charAt(0)==='#')?GREG[k][2]:(isLight()?'#c7ccd6':'#3a414f'); ctx.fillRect(cx,0,x1-cx,19);
        ctx.fillStyle=GREG[k][3]?'#eef2f8':'#0b0e13'; ctx.fillText(GREG[k][0].toUpperCase(),(cx+x1)/2,10); } }
    ctx.textAlign='left';
    for(let j=0;j<CW.length;j++){ const x=XOFF[j]-sl,cx=Math.max(GUT,x),cwj=x+CW[j]-cx; if(x>w||cwj<=0)continue;
      const hc=(curLens==='type'&&THDR[j]&&isOn(TGRP[GCT[j]]))?THDR[j]:null;   // the header CELL only — never the column body
      if(hc){ ctx.fillStyle=hc; ctx.fillRect(cx,20,cwj,19); }
      ctx.save();ctx.beginPath();ctx.rect(cx,20,cwj,19);ctx.clip(); ctx.fillStyle=hc?'#0b0e13':T.t3; ctx.fillText(CN[j].toUpperCase(),x+7,30); ctx.restore();
      const op=(0.12+0.75*(FILL[j]/mxf)); ctx.fillStyle='rgba(255,90,31,'+op.toFixed(2)+')'; ctx.fillRect(cx+1,42,Math.max(0,cwj-2),4); }
    ctx.fillStyle=T.gl; ctx.fillRect(0,HDR-1,w+2,1);
    ctx.fillStyle=T.hb; ctx.fillRect(0,0,GUT,HDR); ctx.strokeStyle=T.gl; ctx.lineWidth=1; ctx.strokeRect(0.5,0.5,GUT-1,HDR-1);
    }
    if(bview){ bview.style.top=(Math.max(0,st-HDR)/(NR*RH)*100)+'%'; bview.style.height=Math.max(1.1,(h/(NR*RH))*100)+'%'; }
    // Every draw() rewrote this innerHTML — including every lens switch, where the row range has not changed at
    // all. Chrome's invalidation trace: ~47 text nodes "Added to layout" / "Removed from layout" per run, each one
    // dirtying layout for the whole pane. Write it only when it actually changes (i.e. on scroll, never on a lens
    // switch or a selection).
    if(pread){ const _pt='rows <b>'+vfirst.toLocaleString()+'–'+vlast.toLocaleString()+'</b> of '+NR.toLocaleString()+' · the whole file, every column · scroll the grid or drag the strip';
      if(_pt!==_preadTxt){ _preadTxt=_pt; pread.innerHTML=_pt; } }
  }
  let raf=0; function sched(){ if(raf)return; raf=requestAnimationFrame(()=>{raf=0;draw();}); }
  let progScrollTs=0;   // timestamp of a jump's programmatic scroll — user scroll/swipe within a hair of it is NOT the jump
  bscroll.addEventListener('scroll',()=>{ if(performance.now()-progScrollTs>90){ hideCard(); hideTips(); } sched(); },{passive:true});
  window.addEventListener('resize',()=>{resize();draw();});
  new MutationObserver(()=>draw()).observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
  // minimap drag -> scroll the grid
  // The minimap drag was the JANKIEST interaction on the page (77% main-thread busy, measured): it called
  // getBoundingClientRect() on EVERY mouse move — a forced synchronous layout — and drove a scroll+redraw per
  // event, and a mouse fires 100+ moves a second. The rail's rect cannot change mid-drag, so take it ONCE on
  // mousedown, and coalesce the drag to one update per animation frame.
  let _mmR=null;
  const ordAt=e=>{ const r=_mmR||(_mmR=bmini.getBoundingClientRect()), yy=(e.touches&&e.touches[0]?e.touches[0].clientY:e.clientY); return Math.max(0,Math.min(1,(yy-r.top)/r.height)); };
  let drag=false, _dgEv=null, _dgRaf=0;
  function toFrac(f){ bscroll.scrollTop=Math.max(0,f*NR*RH - bscroll.clientHeight/2 + HDR); }
  function dragTo(e){ toFrac(ordAt(e)); }
  function dragQueue(e){ _dgEv=e; if(_dgRaf) return;
    _dgRaf=requestAnimationFrame(()=>{ _dgRaf=0; const ev=_dgEv; _dgEv=null; if(ev&&drag) dragTo(ev); }); }
  function dragStart(e){ drag=true; _mmR=bmini.getBoundingClientRect(); dragTo(e); }
  function dragEnd(){ drag=false; _mmR=null; }
  bmini.addEventListener('mousedown',e=>{e.preventDefault();dragStart(e);});
  window.addEventListener('mousemove',e=>{ if(drag) dragQueue(e); });
  window.addEventListener('mouseup',dragEnd);
  bmini.addEventListener('touchstart',e=>{dragStart(e);},{passive:true});
  bmini.addEventListener('touchmove',e=>{ if(drag) dragQueue(e); },{passive:true});
  bmini.addEventListener('touchend',dragEnd);
  // ---- Excel-like resize: drag a column's right edge (in the header) to widen; drag a row edge (in the gutter) to set row height ----
  let rz=null; const RZ_EDGE=5;
  function hitBorder(mx,my,sl,st){
    if(my<HDR && mx>=GUT){ for(let j=0;j<CW.length;j++){ if(Math.abs(mx-(XOFF[j]+CW[j]-sl))<=RZ_EDGE) return {type:'col',j:j}; } }
    else if(mx<GUT && my>=HDR){ const o=Math.round((st-HDR+my)/RH)-1; if(o>=0 && Math.abs(my-(HDR+(o+1)*RH-st))<=RZ_EDGE) return {type:'row',o:o}; }
    return null; }
  // hover: rich EVIDENCE card on a flagged cell (the what + why, proved by the row's own numbers); simple value tip otherwise
  const gtip=document.createElement('div'); gtip.className='mtip'; document.body.appendChild(gtip);
  const evc=document.createElement('div'); evc.className='evcard'; document.body.appendChild(evc);
  // ⛔ THE GRID'S mousemove HANDLER WAS THRASHING THE MAIN THREAD ON EVERY MOUSE MOVE. It read
  // getBoundingClientRect() (a forced layout), rewrote cursor/display/opacity whether or not they had changed,
  // and rebuilt the evidence card's innerHTML — dozens of times a second, just from moving the cursor. And the
  // cursor CROSSES THE GRID on its way to the lens buttons, so the click always landed on a thrashed thread.
  // Chrome's trace over 10 real interactions (cursor from the grid, across the legend, to the lens bar, click):
  // 78 style recalcs and 41 PAINTS each. Now: one handler run per animation frame, the rect is cached, and every
  // DOM write is guarded so it only happens when the value actually changes.
  let _rect=null, _cur='default', _tipOn=false, _cardOn=false, _cardKey='';
  const _grect=()=>_rect||(_rect=gcanvas.getBoundingClientRect());
  const _invRect=()=>{ _rect=null; };
  window.addEventListener('scroll',_invRect,{passive:true});
  window.addEventListener('resize',_invRect);
  bscroll.addEventListener('scroll',_invRect,{passive:true});
  function setCursor(c){ if(_cur!==c){ _cur=c; gcanvas.style.cursor=c; } }
  function hideTips(){ _pend.delete('gtip'); if(!_tipOn) return; _tipOn=false; gtip.style.opacity='0'; gtip.style.visibility='hidden'; }
  function hideCard(){ _pend.delete('evc'); _cardKey=''; if(!_cardOn) return; _cardOn=false; evc.style.opacity='0'; evc.style.visibility='hidden'; }
  let _navPos='';                                                        // set by step(); the hover path clears it
  function cardHTML(ev,o){ return '<div class=evh style="--ec:'+ev.c+'"><i></i>'+ev.t+'</div><div class=evw>'+ev.what+'</div><div class=evwhy>'+ev.why+'</div>'
      +'<div class=evp>'+ev.proof.map(p=>'<span class=evpr><b>'+p[0]+'</b><em>'+p[1]+'</em></span>').join('')+'</div><div class=evsrc>'+_navPos+'row '+o.toLocaleString()+' · '+String(gval(o,0)||'').replace(/</g,'&lt;')+'</div>'; }
  function placeCard(cx,cy){ if(!_cardOn){ _cardOn=true; evc.style.visibility='visible'; }
    place('evc',()=>{ const tw=evc.offsetWidth,th=evc.offsetHeight; let L=cx+16; if(L+tw>window.innerWidth-8) L=cx-tw-16; L=Math.max(8,L);
      let Tp=Math.max(8,Math.min(cy-th/2,window.innerHeight-th-8)); _put(evc,L,Tp); evc.style.opacity='1'; }); }
  function showCard(o,j,name,cx,cy){ const k=o+':'+j+':'+name+':'+_navPos;
    if(k!==_cardKey){ _cardKey=k; evc.innerHTML=cardHTML(evidence(o,j,name),o); }   // same cell + same position -> do not rebuild
    placeCard(cx,cy); }
  function showCardAt(o,j){ const isClaim=(curLens==='claims'); const code=isClaim?claimAt(o,j):flagAt(o,j); if(!code){ hideCard(); return; } const name=(isClaim?CLM:FLAGS)[code];
    const r=_grect(); const cx=r.left+Math.min(gcanvas.clientWidth-8,Math.max(GUT,XOFF[j]-bscroll.scrollLeft)+CW[j]/2); const cy=r.top+(HDR+o*RH-bscroll.scrollTop)+RH/2; showCard(o,j,name,cx,cy); }
  // coalesce to ONE run per animation frame — a mouse can fire 100+ moves a second and none of this needs to run
  // more often than the screen refreshes
  let _mmEv=null, _mmRaf=0;
  gcanvas.addEventListener('mousemove',e=>{ _mmEv=e; if(_mmRaf) return;
    _mmRaf=requestAnimationFrame(()=>{ _mmRaf=0; const ev=_mmEv; _mmEv=null; if(ev) onMove(ev); }); });
  function onMove(e){ if(rz) return; const r=_grect(), mx=e.clientX-r.left, my=e.clientY-r.top, sl=bscroll.scrollLeft,st=bscroll.scrollTop;
    const hb=hitBorder(mx,my,sl,st); if(hb){ setCursor(hb.type==='col'?'col-resize':'row-resize'); hideTips(); hideCard(); return; } setCursor('default');
    if(mx<GUT||my<HDR){ hideTips(); hideCard(); return; }
    const o=Math.floor((st-HDR+my)/RH); let j=-1; for(let k=0;k<CW.length;k++){ const x=XOFF[k]-sl; if(mx>=x&&mx<x+CW[k]){j=k;break;} }
    if(o<0||o>=NR||j<0){ hideTips(); hideCard(); return; }
    const isClaim=(curLens==='claims'); const code=isClaim?claimAt(o,j):flagAt(o,j); const name=(isClaim?CLM:FLAGS)[code];
    if(code && isOn(name)){ hideTips(); _navPos=''; showCard(o,j,name,e.clientX,e.clientY); return; }   // hover: no step position
    const id=GCOL[j](o); if(id===0){ hideTips(); hideCard(); return; }
    hideCard(); const v=G.cols[j].dv[id-1]; const txt='row '+o.toLocaleString()+' · '+CN[j]+' = '+v;
    if(gtip.textContent!==txt) gtip.textContent=txt;                     // only write when it actually changed
    if(!_tipOn){ _tipOn=true; gtip.style.visibility='visible'; }
    const _mx=e.clientX, _my=e.clientY;                                  // measure+position in ONE rAF — never mid-move
    place('gtip',()=>{ const tw=gtip.offsetWidth,th=gtip.offsetHeight;
      _put(gtip,Math.min(_mx+14,window.innerWidth-tw-8),Math.max(8,_my-th-10)); gtip.style.opacity='1'; }); }
  gcanvas.addEventListener('mouseleave',()=>{ if(!rz){ hideTips(); hideCard(); } });
  gcanvas.addEventListener('mousedown',e=>{ const r=gcanvas.getBoundingClientRect(); const hb=hitBorder(e.clientX-r.left,e.clientY-r.top,bscroll.scrollLeft,bscroll.scrollTop); if(!hb) return;
    e.preventDefault(); hideCard(); hideTips(); document.body.style.userSelect='none';
    rz = hb.type==='col' ? {type:'col',j:hb.j,x0:e.clientX,w0:CW[hb.j]} : {type:'row',o:hb.o,y0:e.clientY,h0:RH}; });
  window.addEventListener('mousemove',e=>{ if(!rz) return;
    if(rz.type==='col'){ CW[rz.j]=Math.max(34,Math.round(rz.w0+(e.clientX-rz.x0))); recomputeX(); }
    else { setRowH(rz.h0+(e.clientY-rz.y0)/(rz.o+1)); }
    draw(); });
  window.addEventListener('mouseup',()=>{ if(rz){ rz=null; document.body.style.userSelect=''; gcanvas.style.cursor='default'; } });
  // EVERY lens's legend is built ONCE, up front, and all of them live in the DOM. Switching a lens toggles which set
  // is shown — no innerHTML, no parse, no re-layout on the click. (Rebuilding the row per switch was one of the three
  // things that made a lens change feel slow; the other two were the 180ms button transition and the minimap re-decode.)
  // A flag chip carries its OWN ▲▼ — always rendered, inert until that flag is selected. Nothing has to appear on
  // click: no control materialises, no layout shift, no wait. The chip's own text never changes either (the step
  // position goes on the evidence card that pops at the cell), so stepping never reflows the legend row.
  const _chip=(k,nm,f,a)=>{ const c=FCLR[k]||'var(--line2)', n=(a||[]).length;
    return '<span class="lgd sel'+(n?' walk':'')+'" data-sel="'+nm+'" data-tip="'+f.note.replace(/"/g,'&quot;')+'" style="--fc:'+c+'">'
      +'<i style="background:'+c+'"></i>'+f.label+' <b>'+f.count+'</b>'
      +'<span class=jbtns'+(n?'':' title="this file has none"')+'><button class=jbtn data-d="-1" title="previous (p / ↑)">▲</button><button class=jbtn data-d="1" title="next (n / ↓)">▼</button></span></span>'; };
  function buildLegends(){ const lg=document.getElementById('llegend'); if(!lg) return;
    const TIP='Show only this value type. Click another to add it — the selection adds up. Click a selected one again to drop it.';
    const sets={
      fill:(LEG.fill||[]).map(x=>'<span><i style="background:'+x[1]+'"></i>'+x[0]+'</span>').join(''),
      type:LEG.type.map(x=>'<span class="lgd sel" data-sel="'+x[2]+'" data-tip="'+TIP+'" style="--fc:'+x[1]+'"><i style="background:'+x[1]+'"></i>'+x[0]+'</span>').join(''),
      flag:FCHIPS.map(k=>{ const f=FIND.find(x=>x.key===k), nm=FKEY2FLAG[k]||k; return f?_chip(k,nm,f,FIDX[nm]):''; }).join(''),
      claims:CCHIPS.map(kv=>{ const f=FIND.find(x=>x.key===kv[0]); return f?_chip(kv[0],kv[1],f,CIDX[kv[1]]):''; }).join('')};
    lg.innerHTML=Object.keys(sets).map(l=>'<div class=lgset data-lens="'+l+'">'+sets[l]+'</div>').join(''); }
  function showLegend(){ const lg=document.getElementById('llegend'); if(!lg) return;
    lg.querySelectorAll('.lgset').forEach(s=>s.classList.toggle('on',s.getAttribute('data-lens')===curLens));
    markSel(); }
  function markSel(){ const lg=document.getElementById('llegend'); if(!lg) return; const s=sel();
    const set=lg.querySelector('.lgset.on'); if(!set) return;
    set.querySelectorAll('.lgd[data-sel]').forEach(e=>e.classList.toggle('solo', s.has(e.getAttribute('data-sel')))); }
  // ⛔ A CLICK MUST NEVER WAIT ON THE CANVAS. draw() used to run SYNCHRONOUSLY inside the click handler, so the
  // button, the legend and the minimap could not paint until the whole grid had been re-rendered — if the canvas
  // is ever slow on a given machine, the entire UI freezes with it, and the switch reads as laggy no matter how
  // fast the DOM part is. Now the controls paint in THIS frame and the grid redraws in the NEXT one: the control
  // always answers in one frame, and the grid follows. (One frame = ~16ms apart; imperceptible.)
  let _dRaf=0;
  function drawSoon(){ if(_dRaf) return; _dRaf=requestAnimationFrame(()=>requestAnimationFrame(()=>{ _dRaf=0; draw(); })); }
  function onSel(){ focusCell=null; markSel(); drawSoon(); }               // a selection changed: class toggle now, repaint next frame
  function setLens(l){ curLens=l; focusCell=null;
    xr.querySelectorAll('.lens button').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
    const sig=(l==='flag'||l==='claims');                                  // both portraits are already decoded — just flip them
    if(pimg) pimg.style.opacity=sig?'0':'1';
    if(pimgs) pimgs.style.opacity=sig?'1':'0';
    showLegend(); drawSoon(); }                                            // each lens keeps its own selection
  xr.querySelectorAll('.lens button').forEach(b=>b.addEventListener('click',()=>setLens(b.dataset.l)));
  // Stepping a flag was producing 67ms LONG FRAMES (measured): goTo scrolled, redrew the whole canvas AND rebuilt
  // the evidence card's innerHTML, all inside the click. Scroll now, redraw next frame, card after that — so an
  // arrow tap answers immediately instead of stalling the frame.
  function goTo(o,j){ progScrollTs=performance.now(); focusCell={o:o,j:j};
    bscroll.scrollTop=Math.max(0,HDR+o*RH-bscroll.clientHeight/2);
    bscroll.scrollLeft=Math.max(0,XOFF[j]-bscroll.clientWidth/2+CW[j]/2);
    drawSoon(); place('jumpcard',()=>showCardAt(o,j)); }
  // ▲/▼ on a chip steps that chip's OWN flag. Its list is precomputed, so a step is a lookup — no scan, no DOM built.
  function step(nm,dir){ const a=idxOf(nm); if(!a.length) return;
    const i=((NAVI[nm]==null?-1:NAVI[nm])+dir+a.length)%a.length; NAVI[nm]=i; lastNav=nm;
    _navPos='<b>'+(i+1).toLocaleString()+' of '+a.length.toLocaleString()+'</b> · ';   // "3 of 1,110" rides on the card, not the chip
    const c=a[i]; goTo(c[0],c[1]); }                                       // the card is built in goTo's deferred frame
  { const _lg=document.getElementById('llegend'); if(_lg) _lg.addEventListener('click',e=>{
      const btn=e.target.closest('.jbtn');                                 // an arrow steps its flag — it never toggles the selection
      if(btn){ const c=btn.closest('.lgd[data-sel]'); if(c) step(c.getAttribute('data-sel'),parseInt(btn.getAttribute('data-d'),10)); return; }
      const el=e.target.closest('.lgd[data-sel]'); if(!el) return;
      const k=el.getAttribute('data-sel'), s=sel();
      if(s.has(k)){ s.delete(k); NAVI[k]=null; if(lastNav===k) lastNav=null; }   // ADDITIVE: toggle, never replace
      else { s.add(k); if(walkable(k)) lastNav=k; }
      onSel(); }); }
  document.addEventListener('keydown',e=>{ if(!lastNav||!sel().has(lastNav)) return; if(e.target&&/^(INPUT|TEXTAREA)$/.test(e.target.tagName)) return;
    if(e.key==='n'||e.key==='ArrowDown'){ step(lastNav,1); e.preventDefault(); } else if(e.key==='p'||e.key==='ArrowUp'){ step(lastNav,-1); e.preventDefault(); } });
  resize();
  buildLegends();
  setLens((D.xray&&D.xray.default_lens)||'flag');
  }).catch(e=>{ if(pread) pread.textContent='Could not load the full file: '+(e&&e.message||e); });
})();
