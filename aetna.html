<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mera — Shop healthcare by procedure × plan (Aetna, nationwide)</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22%3E%3Crect width=%2216%22 height=%2216%22 rx=%223%22 fill=%22%23FF5A1F%22/%3E%3Ctext x=%228%22 y=%2212%22 font-size=%2211%22 text-anchor=%22middle%22 fill=%22%23fff%22 font-family=%22Georgia,serif%22%3EM%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090d;--line:#1a2130;--line2:#28313f;--tx:#e9edf4;--tx2:#9aa6b7;--tx3:#5c6675;--ac:#5eead4;--ac2:#818cf8;--gold:#fbbf24;--coral:#fb7185;--or:#FF5A1F;--pay:#b07cd6}
*{box-sizing:border-box}
html,body{margin:0}
body{background:radial-gradient(130% 90% at 0% 0%,#0d1421,#07090d 55%);color:var(--tx);font-family:Inter,system-ui,Segoe UI,sans-serif;font-size:14.5px;-webkit-font-smoothing:antialiased;letter-spacing:-.005em}
b{font-weight:700}
/* topbar */
.topbar{position:sticky;top:0;z-index:1200;display:flex;align-items:center;gap:14px;padding:10px 22px;background:#000;border-bottom:1px solid #272727}
.brand{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:23px;line-height:1;white-space:nowrap;color:#fff}
.brand span{color:var(--or)}
.crumb{font-size:13px;color:#8E949E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.crumb b{color:#fff;font-weight:700}
.crumb .pay{color:var(--pay);font-weight:700}
.theme-btn{margin-left:auto;width:34px;height:34px;display:inline-grid;place-items:center;background:transparent;border:1px solid #272727;color:#8E949E;border-radius:8px;cursor:pointer;transition:.12s;flex:0 0 auto}
.theme-btn:hover{color:var(--or);border-color:var(--or)}
.theme-btn .ic-moon{display:none}
[data-theme=light] .theme-btn .ic-sun{display:none}[data-theme=light] .theme-btn .ic-moon{display:block}
/* search bar */
.searchwrap{position:sticky;top:55px;z-index:1100;background:linear-gradient(180deg,#0b0f16,#0a0d13);border-bottom:1px solid var(--line);padding:16px 22px}
.searchwrap .lead{font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:600;margin:0 0 12px;letter-spacing:-.01em}
.searchwrap .lead em{font-style:normal;background:linear-gradient(120deg,var(--ac),var(--ac2));-webkit-background-clip:text;background-clip:text;color:transparent}
.tb{display:flex;gap:11px;flex-wrap:wrap;align-items:stretch}
.qbox{position:relative;flex:1;min-width:280px}
input.q{background:#0f141d;color:#e6edf3;border:1px solid var(--line2);border-radius:11px;padding:12px 16px;font:inherit;font-size:14px;width:100%}
input.q:focus{outline:none;border-color:var(--ac)}
.sugg{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#0d1119;border:1px solid var(--line2);border-radius:13px;padding:6px;z-index:120;box-shadow:0 14px 40px rgba(0,0,0,.55);display:none;max-height:340px;overflow:auto}
.sugg.open{display:block}
.sugg-it{display:flex;justify-content:space-between;gap:12px;padding:10px 13px;border-radius:9px;cursor:pointer;font-size:13.5px}
.sugg-it:hover,.sugg-it.hi{background:#141b28}
.sugg-it .c{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx3)}
.dd{position:relative;flex:0 0 auto}
.ddbtn{display:flex;align-items:center;gap:10px;background:#0f141d;border:1px solid var(--line2);border-radius:11px;padding:6px 14px;color:var(--tx);font:inherit;cursor:pointer;transition:.15s;min-height:46px;min-width:150px}
.ddbtn:hover{border-color:var(--ac)}
.ddbtn .stack{display:flex;flex-direction:column;align-items:flex-start;line-height:1.25;flex:1;min-width:0}
.ddbtn .lab{font-size:8.5px;letter-spacing:.09em;color:var(--tx3);text-transform:uppercase;font-weight:800}
.ddbtn .cur{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;text-align:left}
.ddbtn svg{flex:0 0 auto;color:var(--tx3);transition:transform .18s}
.dd.open .ddbtn{border-color:var(--ac)}.dd.open .ddbtn svg{transform:rotate(180deg)}
.ddlist{position:absolute;top:calc(100% + 7px);left:0;min-width:100%;background:#0d1119;border:1px solid var(--line2);border-radius:13px;padding:6px;z-index:120;box-shadow:0 14px 40px rgba(0,0,0,.55);display:none;white-space:nowrap}
.dd.open .ddlist{display:block}
.ddit{display:flex;justify-content:space-between;gap:16px;padding:9px 12px;border-radius:9px;font-size:13px;font-weight:600;color:var(--tx2);cursor:pointer}
.ddit:hover{background:#141b28;color:var(--tx)}.ddit.on{color:var(--ac)}.ddit.on::after{content:'✓';font-weight:800}
.ddit small{color:var(--tx3);font-weight:500}
.count{font-size:12px;color:var(--tx3);margin-top:10px}
.count b{color:var(--tx2);font-family:'JetBrains Mono',monospace}
/* split */
.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.05fr);gap:0;height:calc(100vh - 160px);min-height:520px}
@media(max-width:900px){.split{grid-template-columns:1fr;height:auto}.mapcol{height:60vh;position:relative!important;top:0!important}}
.listcol{overflow-y:auto;padding:16px 18px 40px;border-right:1px solid var(--line)}
.mapcol{position:sticky;top:160px;height:calc(100vh - 160px)}
#lmap{height:100%;width:100%;background:#000}
.leaflet-container{background:#0a0d13}
.leaflet-popup-content-wrapper{background:#171b22;color:#fff;border:1px solid #2a2f3a;border-radius:12px}
.leaflet-popup-tip{background:#171b22}
.leaflet-popup-content{margin:11px 14px;font-family:Inter,sans-serif}
.leaflet-popup-content .pn{font-weight:800;font-size:13px}
.leaflet-popup-content .pp{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;margin-top:3px}
.leaflet-control-zoom{border:none!important;box-shadow:0 6px 22px rgba(0,0,0,.34);border-radius:14px;overflow:hidden;margin:13px}
.leaflet-control-zoom a{width:34px;height:34px;line-height:34px;background:rgba(20,22,28,.72);backdrop-filter:blur(10px);color:#f0f0f0;border:none;font-size:18px}
.leaflet-control-zoom a:hover{background:rgba(48,52,62,.9);color:#fff}
/* Airbnb-style price bubbles */
.pricepin{background:none!important;border:0!important}
.pricepin b{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:6px 12px;border-radius:15px;background:#0c1017;border:1.5px solid var(--line2);white-space:nowrap;box-shadow:0 2px 10px rgba(0,0,0,.55);cursor:pointer;transition:transform .1s,background .1s;position:relative;transform:translate(-50%,-50%)}
.pricepin b:hover,.pricepin b.on{background:var(--ac);color:#04120e!important;border-color:var(--ac)!important;z-index:1000;transform:translate(-50%,-50%) scale(1.12)}
[data-theme=light] .pricepin b{background:#fff;box-shadow:0 2px 9px rgba(16,24,40,.22)}
/* cards */
.sortbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.sortbar .t{font-size:12px;color:var(--tx3);font-weight:700}
.lens{display:inline-flex;gap:2px;background:var(--bg);border:1px solid var(--line2);border-radius:10px;padding:3px}
.lens button{background:none;border:0;color:var(--tx3);border-radius:7px;padding:6px 13px;font:inherit;font-size:11.5px;font-weight:700;cursor:pointer}
.lens button.on{background:var(--ac);color:#04120e}
.hcard{display:flex;gap:13px;align-items:stretch;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#0d1119,#0a0d13);padding:13px 15px;margin-bottom:10px;cursor:pointer;transition:border-color .13s,transform .13s}
.hcard:hover{border-color:var(--line2);transform:translateY(-1px)}
.hcard.hi{border-color:var(--ac);box-shadow:0 0 0 1px var(--ac) inset}
.hcard .rank{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx3);font-weight:700;padding-top:3px;min-width:22px}
.hcard .body{flex:1;min-width:0}
.hcard .nm{font-weight:800;font-size:14px;line-height:1.25;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.hcard .loc{font-size:11.5px;color:var(--tx3);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hcard .net{display:inline-block;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--tx2);border:1px solid var(--line2);border-radius:5px;padding:2px 6px;margin-top:7px}
.hcard .deal{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:.02em;border-radius:5px;padding:2px 7px;margin-top:7px;margin-left:6px}
.hcard .deal.good{background:rgba(94,234,212,.14);color:var(--ac)}
.hcard .deal.hi{background:rgba(251,113,133,.12);color:var(--coral)}
.hcard .ftype{display:inline-block;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--ac2);border:1px solid var(--line2);border-radius:5px;padding:2px 6px;margin-top:7px;margin-left:6px}
.hcard .price{flex:0 0 auto;text-align:right;display:flex;flex-direction:column;justify-content:center;min-width:96px}
.hcard .price .p{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:17px}
.hcard .price .r{font-size:10px;color:var(--tx3);margin-top:2px;font-family:'JetBrains Mono',monospace}
.hcard .price .swatch{width:100%;height:4px;border-radius:3px;margin-top:6px}
.empty{text-align:center;padding:48px 20px;color:var(--tx2)}
.empty .big{font-size:16px;font-weight:700;margin-bottom:8px}
.empty .sm{font-size:12.5px;color:var(--tx3);line-height:1.6;max-width:420px;margin:0 auto}
.pilllane{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px;justify-content:center}
.pill{font-size:12px;font-weight:700;color:var(--tx2);border:1px solid var(--line2);border-radius:20px;padding:7px 14px;cursor:pointer;background:#0f141d}
.pill:hover{color:var(--tx);border-color:var(--ac)}
.foot{color:var(--tx3);font-size:11.3px;line-height:1.7;padding:16px 22px 40px;border-top:1px solid var(--line)}
.foot b{color:var(--tx2)}
.leg{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--tx3);margin-left:auto}
.leg .bar{width:120px;height:8px;border-radius:4px;background:linear-gradient(90deg,var(--ac),var(--gold),var(--coral))}
[data-theme=light]{--bg:#f4f6fa;--line:#e1e6ee;--line2:#c9d2df;--tx:#171b21;--tx2:#46536a;--tx3:#7d8899;--ac:#0d9488;--ac2:#4f46e5}
[data-theme=light] body{background:radial-gradient(130% 90% at 0% 0%,#fff,#f2f5f9 55%)}
[data-theme=light] .searchwrap{background:linear-gradient(180deg,#fff,#f7f9fc)}
[data-theme=light] .hcard{background:#fff}
[data-theme=light] input.q,[data-theme=light] .ddbtn{background:#fff}
[data-theme=light] .sugg,[data-theme=light] .ddlist{background:#fff}
[data-theme=light] .leaflet-container{background:#e8ecf2}
</style></head><body>
<header class="topbar">
  <div class="brand"><span>M</span>era</div>
  <div class="crumb"><span class="pay">Aetna</span> &middot; <b>Nationwide</b> &middot; shop healthcare by procedure &amp; plan</div>
  <button class="theme-btn" id="theme" title="Switch light / dark" aria-label="Switch light or dark mode">
    <svg class="ic-sun" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0-5a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1zm0 17a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1zM3 11h1a1 1 0 1 1 0 2H3a1 1 0 1 1 0-2zm17 0h1a1 1 0 1 1 0 2h-1a1 1 0 1 1 0-2zM5.6 4.2l.7.7A1 1 0 1 1 4.9 6.3l-.7-.7a1 1 0 0 1 1.4-1.4zm12.8 12.8l.7.7a1 1 0 1 1-1.4 1.4l-.7-.7a1 1 0 0 1 1.4-1.4zM18.4 4.2a1 1 0 0 1 0 1.4l-.7.7a1 1 0 1 1-1.4-1.4l.7-.7a1 1 0 0 1 1.4 0zM5.6 17l.7.7a1 1 0 0 1-1.4 1.4l-.7-.7A1 1 0 0 1 5.6 17z"/></svg>
    <svg class="ic-moon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M21 12.8A8.5 8.5 0 1 1 11.2 3a7 7 0 1 0 9.8 9.8z"/></svg>
  </button>
</header>
<div class="searchwrap">
  <div class="lead">Shop healthcare by <em>procedure</em>.</div>
  <div class="tb">
    <div class="qbox">
      <input class="q" id="q" placeholder="Search a procedure — try 'MRI', 'colonoscopy', 'knee replacement'…" autocomplete="off">
      <div class="sugg" id="sugg"></div>
    </div>
    <div class="qbox" style="flex:0 1 280px;min-width:200px">
      <input class="q" id="loc" placeholder="Where — city, ZIP, or state…" autocomplete="off">
      <button id="locclear" title="Clear location" style="display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:0;color:var(--tx3);font-size:17px;cursor:pointer;line-height:1">&times;</button>
      <div class="sugg" id="locsugg"></div>
    </div>
    <div class="dd" id="dd_ins"><button class="ddbtn" type="button"><div class="stack"><span class="lab">Insurer</span><span class="cur">Aetna</span></div><svg viewBox="0 0 24 24" width="15" height="15"><path fill="none" stroke="currentColor" stroke-width="2" d="M6 9l6 6 6-6"/></svg></button></div>
    <div class="dd" id="dd_plan"><button class="ddbtn" type="button"><div class="stack"><span class="lab">Plan / network</span><span class="cur" id="curplan">All plans</span></div><svg viewBox="0 0 24 24" width="15" height="15"><path fill="none" stroke="currentColor" stroke-width="2" d="M6 9l6 6 6-6"/></svg></button><div class="ddlist" id="planlist"></div></div>
    <div class="dd" id="dd_type"><button class="ddbtn" type="button"><div class="stack"><span class="lab">Facility type</span><span class="cur" id="curtype">All facilities</span></div><svg viewBox="0 0 24 24" width="15" height="15"><path fill="none" stroke="currentColor" stroke-width="2" d="M6 9l6 6 6-6"/></svg></button><div class="ddlist" id="typelist"></div></div>
  </div>
  <div class="count" id="cnt"></div>
</div>
<div class="split">
  <div class="listcol" id="listcol"></div>
  <div class="mapcol"><div id="lmap"></div></div>
</div>
<div class="foot" id="foot"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
var D;var DATA_URL="https://keithkallison-ai.github.io/mera-az/aetna_data.json";
function boot(){
var $=function(s){return document.querySelector(s)},$$=function(s){return Array.prototype.slice.call(document.querySelectorAll(s))};
function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
function money(c){return '$'+Math.round(Number(c)/100).toLocaleString('en-US');}  // cents -> dollars
function hloc(h){return h.city?(h.city+', '+(h.st||'')):(h.st||((h.addr||'').split(',')[0]||'').trim());}
function dealBadge(med,mid){if(!mid)return '';var pct=Math.round((1-med/mid)*100);
  if(pct>=25)return '<span class="deal good">'+pct+'% below typical</span>';
  if(pct<=-40)return '<span class="deal hi">'+(-pct)+'% above</span>';return '';}
// ---- state ---- (plan is a compact key: 'A' = all plans pooled, '0'/'1'... = network index)
var state={code:null,plan:'A',tail:false,loc:null,ftype:null};
// ---- FULL-UNIVERSE lane: DuckDB-WASM over sharded parquet (any of the 16,690 codes; inline top set stays instant) ----
var SHARD_BASE="https://keithkallison-ai.github.io/mera-az", CATALOG_URL="https://keithkallison-ai.github.io/mera-az/aetna_code_catalog.json", MANIFEST=[{"file": "aetna_codes_0.parquet", "code_lo": "0001F", "code_hi": "52281"}, {"file": "aetna_codes_1.parquet", "code_lo": "52282", "code_hi": "J2350"}, {"file": "aetna_codes_2.parquet", "code_lo": "J2351", "code_hi": "V5364"}], ZIP_URL="https://keithkallison-ai.github.io/mera-az/zip_centroids.json";
var byNpiIdx={}; D.hospitals.forEach(function(h,i){byNpiIdx[h.npi]=i;});
var inlineCodes={}; D.procedures.forEach(function(p){inlineCodes[p.code]=true;});
var catalog=D.procedures.slice();
var tailCache={};
var _duck=null,_conn=null,_reg={};
async function initDuck(){
  if(_conn)return _conn;
  var duckdb=await import('https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.28.0/+esm');
  var bundle=await duckdb.selectBundle(duckdb.getJsDelivrBundles());
  var wurl=URL.createObjectURL(new Blob(['importScripts("'+bundle.mainWorker+'");'],{type:'text/javascript'}));
  _duck=new duckdb.AsyncDuckDB(new duckdb.ConsoleLogger(),new Worker(wurl));
  await _duck.instantiate(bundle.mainModule,bundle.pthreadWorker);
  _duck._proto=duckdb.DuckDBDataProtocol.HTTP; _conn=await _duck.connect(); return _conn;
}
function shardFor(code){for(var i=0;i<MANIFEST.length;i++){if(code>=MANIFEST[i].code_lo&&code<=MANIFEST[i].code_hi)return MANIFEST[i];}return null;}
async function queryTail(code){
  if(tailCache[code])return tailCache[code];
  var sh=shardFor(code); if(!sh){tailCache[code]=[];return [];}
  var conn=await initDuck(); var fname='sh'+sh.file;
  if(!_reg[fname]){await _duck.registerFileURL(fname,SHARD_BASE+'/'+sh.file,_duck._proto,false);_reg[fname]=true;}
  var safe=String(code).replace(/[^A-Za-z0-9]/g,'');
  var res=await conn.query("SELECT CAST(npi AS VARCHAR) npi,CAST(med AS INT) med,CAST(mn AS INT) mn,CAST(mx AS INT) mx,CAST(n AS INT) n FROM '"+fname+"' WHERE code='"+safe+"'");
  var rows=res.toArray().map(function(r){var o=r.toJSON();var hi=byNpiIdx[o.npi];if(hi===undefined)return null;
    return {h:D.hospitals[hi],med:o.med,mn:o.mn,mx:o.mx,n:o.n,net:'Aetna'};}).filter(Boolean);
  tailCache[code]=rows; return rows;
}
// merge the full 16,690-code catalog for all-code autocomplete (inline codes already searchable)
fetch(CATALOG_URL).then(function(r){return r.ok?r.json():[];}).then(function(cat){
  var seen={}; catalog.forEach(function(p){seen[p.code]=true;});
  for(var i=0;i<cat.length;i++){if(!seen[cat[i].code])catalog.push({code:cat[i].code,label:cat[i].label});}
}).catch(function(){});
// ---- theme ----
(function(){var t=$('#theme');function set(m){document.documentElement.setAttribute('data-theme',m);try{localStorage.setItem('mera-th',m)}catch(e){}if(window._tile&&window._map){window._tile.remove();window._tile=L.tileLayer(tileUrl(),{subdomains:'abcd',maxZoom:19,attribution:'© OpenStreetMap © CARTO'}).addTo(window._map);}}
  var init=null;try{init=localStorage.getItem('mera-th')}catch(e){}; if(init)set(init);
  t.addEventListener('click',function(){set(document.documentElement.getAttribute('data-theme')==='light'?'dark':'light')});})();
function isLight(){return document.documentElement.getAttribute('data-theme')==='light';}
function tileUrl(){return isLight()?'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';}
// ---- map ----
var map=L.map('lmap',{zoomControl:true,scrollWheelZoom:true,worldCopyJump:true}).setView([39.5,-98.35],4);
window._map=map;
window._tile=L.tileLayer(tileUrl(),{subdomains:'abcd',maxZoom:19,attribution:'© OpenStreetMap © CARTO'}).addTo(map);
var cvs=L.canvas({padding:.5});
var markers={}; // npi -> circleMarker
function colorFor(t){ // t in [0,1] cheap->expensive
  var stops=[[94,234,212],[251,191,36],[251,113,133]];
  var i=t<=.5?0:1, f=t<=.5?t/.5:(t-.5)/.5, a=stops[i], b=stops[i+1];
  return 'rgb('+Math.round(a[0]+(b[0]-a[0])*f)+','+Math.round(a[1]+(b[1]-a[1])*f)+','+Math.round(a[2]+(b[2]-a[2])*f)+')';
}
function drawMarkers(rows){ // NON-INTERACTIVE density dots (no popup/click -> no mousemove hit-testing over 6,012 markers)
  Object.keys(markers).forEach(function(k){map.removeLayer(markers[k]);}); markers={};
  if(!rows){ D.hospitals.forEach(function(h){markers['a'+h.npi]=L.circleMarker([h.lat,h.lon],{renderer:cvs,radius:2.3,color:'#5eead4',weight:0,fillOpacity:.22,interactive:false}).addTo(map);}); return; }
  var lo=curLo||0,hi=curHi||1,span=(hi-lo)||1;
  rows.forEach(function(r){var col=colorFor((r.med-lo)/span);
    markers[r.h.npi]=L.circleMarker([r.h.lat,r.h.lon],{renderer:cvs,radius:4.5,color:'#0a0d13',weight:.5,fillColor:col,fillOpacity:.8,interactive:false}).addTo(map);});
}
function fitAll(rows){var g=L.featureGroup(rows.map(function(r){return markers[r.h.npi];}));
  try{map.fitBounds(g.getBounds().pad(.12),{maxZoom:11,animate:false});}catch(e){}}
function fitBB(bb){try{map.flyToBounds([[bb[0],bb[1]],[bb[2],bb[3]]],{maxZoom:12,padding:[30,30],duration:.6});}catch(e){}}
// ---- Airbnb-style PRICE BUBBLES: a price pill on each in-view hospital ----
var pills={}, PILLCAP=160;
function pillLabel(c){var d=c/100;if(d>=10000)return '$'+Math.round(d/1000)+'k';if(d>=1000)return '$'+(d/1000).toFixed(1).replace(/\.0$/,'')+'k';return '$'+Math.round(d);}
function drawPills(rows){ // rows = in-view, cheapest-first. DECLUTTER: greedily place non-overlapping pills (Airbnb).
  Object.keys(pills).forEach(function(k){map.removeLayer(pills[k]);}); pills={};
  var lo=curLo,hi=curHi,span=(hi-lo)||1,placed=[],n=0;
  for(var i=0;i<rows.length&&n<PILLCAP;i++){var r=rows[i];
    var pt=map.latLngToContainerPoint([r.h.lat,r.h.lon]);
    if(pt.x<-60||pt.y<-30||pt.x>map.getSize().x+60||pt.y>map.getSize().y+30)continue; // off-canvas
    var clash=false;for(var j=0;j<placed.length;j++){if(Math.abs(placed[j].x-pt.x)<46&&Math.abs(placed[j].y-pt.y)<24){clash=true;break;}}
    if(clash)continue; placed.push(pt); n++;
    var col=colorFor((r.med-lo)/span);
    var m=L.marker([r.h.lat,r.h.lon],{icon:L.divIcon({className:'pricepin',iconSize:[1,1],iconAnchor:[0,0],
      html:'<b style="color:'+col+';border-color:'+col+'66">'+pillLabel(r.med)+'</b>'}),zIndexOffset:300,riseOnHover:true});
    m.on('click',function(np){return function(){highlight(np,true);};}(r.h.npi));
    m.addTo(map); pills[r.h.npi]=m;
  }
}
function highlight(npi,fromMap){
  $$('.hcard').forEach(function(c){c.classList.toggle('hi',c.getAttribute('data-npi')==String(npi));});
  var card=$('.hcard[data-npi="'+npi+'"]'); if(card&&!fromMap)card.scrollIntoView({block:'nearest',behavior:'smooth'});
  // if this hospital's bubble was decluttered off the map, CREATE it now — a selected hospital always shows a bubble
  if(!pills[npi]){var r=curRows.filter(function(x){return String(x.h.npi)===String(npi);})[0];
    if(r){var lo=curLo||0,hi=curHi||1,span=(hi-lo)||1,col=colorFor((r.med-lo)/span);
      var mk=L.marker([r.h.lat,r.h.lon],{icon:L.divIcon({className:'pricepin',iconSize:[1,1],iconAnchor:[0,0],
        html:'<b style="color:'+col+';border-color:'+col+'66">'+pillLabel(r.med)+'</b>'}),zIndexOffset:600});
      mk.on('click',function(){highlight(npi,true);});mk.addTo(map);pills[npi]=mk;}}
  Object.keys(pills).forEach(function(k){var ic=pills[k]._icon,bb=ic&&ic.querySelector('b');if(bb)bb.classList.toggle('on',k==String(npi));});
}
// ---- plan dropdown ----
(function(){var pl=$('#planlist');var opts=[{key:'A',label:'All plans',n:D.hospitals.length}].concat(D.networks.map(function(n,i){return {key:String(i),label:n.name,n:n.n_hosp};}));
  pl.innerHTML=opts.map(function(o){return '<div class="ddit'+(o.key===state.plan?' on':'')+'" data-key="'+esc(o.key)+'" data-label="'+esc(o.label)+'">'+esc(o.label)+' <small>'+o.n.toLocaleString()+' hosp</small></div>';}).join('');
  $('#dd_plan .ddbtn').addEventListener('click',function(e){e.stopPropagation();$('#dd_plan').classList.toggle('open');$('#dd_ins').classList.remove('open');});
  $('#dd_ins .ddbtn').addEventListener('click',function(e){e.stopPropagation();$('#dd_ins').classList.remove('open');});
  pl.addEventListener('click',function(e){var it=e.target.closest('.ddit');if(!it)return;state.plan=it.getAttribute('data-key');
    $('#curplan').textContent=it.getAttribute('data-label');$$('#planlist .ddit').forEach(function(d){d.classList.toggle('on',d.getAttribute('data-key')===state.plan);});$('#dd_plan').classList.remove('open');render();});
  document.addEventListener('click',function(){$('#dd_plan').classList.remove('open');});})();
// ---- facility-type filter ----
(function(){var tl=$('#typelist');
  var order=["Acute care","Critical access","Children's","Women's","Psychiatric","Long-term care","Special","Rehabilitation","Chronic disease","Military","Other"];
  var cnt={}; D.hospitals.forEach(function(h){if(h.type)cnt[h.type]=(cnt[h.type]||0)+1;});
  var opts=[{v:"",label:"All facilities",n:D.hospitals.length}].concat(order.filter(function(t){return cnt[t];}).map(function(t){return {v:t,label:t,n:cnt[t]};}));
  tl.innerHTML=opts.map(function(o){return '<div class="ddit'+((o.v||"")===(state.ftype||"")?" on":"")+'" data-t="'+esc(o.v)+'">'+esc(o.label)+' <small>'+o.n.toLocaleString()+'</small></div>';}).join("");
  $('#dd_type .ddbtn').addEventListener('click',function(e){e.stopPropagation();$('#dd_type').classList.toggle('open');$('#dd_plan').classList.remove('open');$('#dd_ins').classList.remove('open');});
  tl.addEventListener('click',function(e){var it=e.target.closest('.ddit');if(!it)return;state.ftype=it.getAttribute('data-t')||null;
    $('#curtype').textContent=state.ftype||"All facilities";$$('#typelist .ddit').forEach(function(d){d.classList.toggle('on',(d.getAttribute('data-t')||"")===(state.ftype||""));});$('#dd_type').classList.remove('open');render();});
  document.addEventListener('click',function(){$('#dd_type').classList.remove('open');});})();
// ---- procedure search ----
var qi=$('#q'),sg=$('#sugg'),hiIdx=-1;
function matches(v){v=v.trim().toLowerCase();if(!v)return D.procedures.slice(0,12);
  var out=[];for(var i=0;i<catalog.length&&out.length<25;i++){var p=catalog[i];
    if((p._l||(p._l=p.label.toLowerCase())).indexOf(v)>=0||(p._c||(p._c=String(p.code).toLowerCase())).indexOf(v)>=0)out.push(p);}return out;}
function showSugg(list){hiIdx=-1;if(!list.length){sg.classList.remove('open');return;}
  sg.innerHTML=list.map(function(p){return '<div class="sugg-it" data-code="'+p.code+'"><span>'+esc(p.label)+'</span><span class="c">'+p.code+'</span></div>';}).join('');sg.classList.add('open');}
qi.addEventListener('input',function(){showSugg(matches(qi.value));});
qi.addEventListener('focus',function(){if(!state.code)showSugg(matches(qi.value));});
qi.addEventListener('keydown',function(e){var its=$$('.sugg-it');if(!its.length)return;
  if(e.key==='ArrowDown'){hiIdx=Math.min(hiIdx+1,its.length-1);e.preventDefault();}
  else if(e.key==='ArrowUp'){hiIdx=Math.max(hiIdx-1,0);e.preventDefault();}
  else if(e.key==='Enter'){var pick=its[hiIdx<0?0:hiIdx];if(pick)choose(pick.getAttribute('data-code'));return;}
  else return; its.forEach(function(t,i){t.classList.toggle('hi',i===hiIdx);});});
sg.addEventListener('click',function(e){var it=e.target.closest('.sugg-it');if(it)choose(it.getAttribute('data-code'));});
document.addEventListener('click',function(e){if(!e.target.closest('.qbox'))sg.classList.remove('open');});
function choose(code){state.code=code;var p=catalog.filter(function(x){return x.code===code;})[0];qi.value=p?p.label:code;sg.classList.remove('open');
  state.tail=!inlineCodes[code];
  if(state.tail){state.plan='A';$('#curplan').textContent='All plans';$$('#planlist .ddit').forEach(function(d){d.classList.toggle('on',d.getAttribute('data-key')==='A');});
    $('#listcol').innerHTML='<div class="empty"><div class="big">Loading '+esc(p?p.label:code)+'&hellip;</div><div class="sm">Querying the full Aetna file for this code &mdash; the first long-tail lookup also loads the in-browser query engine.</div></div>';
    $('#cnt').innerHTML='';
    queryTail(code).then(function(){render();}).catch(function(e){$('#listcol').innerHTML='<div class="empty"><div class="big">Couldn&rsquo;t load this code</div><div class="sm">'+esc(String((e&&e.message)||e))+'</div></div>';});
  }else{render();}}
// ---- sort ----
var sortMode='price';
// ---- location search ("Where": city / state / ZIP) — Airbnb-style ----
var li=$('#loc'),lsg=$('#locsugg'),lHi=-1,_zips=null;
function locMatches(v){v=v.trim().toLowerCase();if(!v)return D.places.slice(0,10);
  if(/^\d{3,5}$/.test(v))return [];
  var out=[];for(var i=0;i<D.places.length&&out.length<20;i++){var pl=D.places[i];if((pl._l||(pl._l=pl.name.toLowerCase())).indexOf(v)>=0)out.push(pl);}return out;}
function showLocSugg(list,zipHint){lHi=-1;
  var html=list.map(function(p){return '<div class="sugg-it" data-loc="'+esc(p.name)+'"><span>'+esc(p.name)+'</span><span class="c">'+p.n+' hosp</span></div>';}).join('');
  if(zipHint)html='<div class="sugg-it" data-zip="'+esc(zipHint)+'"><span>ZIP '+esc(zipHint)+'</span><span class="c">go &rarr;</span></div>'+html;
  if(!html){lsg.classList.remove('open');return;} lsg.innerHTML=html; lsg.classList.add('open');}
li.addEventListener('input',function(){var v=li.value.trim();$('#locclear').style.display=v?'block':'none';
  showLocSugg(locMatches(v), /^\d{5}$/.test(v)?v:null);});
li.addEventListener('focus',function(){var v=li.value.trim();showLocSugg(locMatches(v), /^\d{5}$/.test(v)?v:null);});
li.addEventListener('keydown',function(e){var its=lsg.querySelectorAll('.sugg-it');
  if(e.key==='ArrowDown'){lHi=Math.min(lHi+1,its.length-1);e.preventDefault();}
  else if(e.key==='ArrowUp'){lHi=Math.max(lHi-1,0);e.preventDefault();}
  else if(e.key==='Enter'){e.preventDefault();var v=li.value.trim();
    if(lHi>=0&&its[lHi])its[lHi].click(); else if(/^\d{5}$/.test(v))gotoZip(v); else if(its[0])its[0].click(); return;}
  else return; its.forEach(function(t,i){t.classList.toggle('hi',i===lHi);});});
lsg.addEventListener('click',function(e){var it=e.target.closest('.sugg-it');if(!it)return;
  if(it.getAttribute('data-zip'))gotoZip(it.getAttribute('data-zip'));
  else{var nm=it.getAttribute('data-loc');var p=D.places.filter(function(x){return x.name===nm;})[0];if(p)chooseLoc(p);}});
document.addEventListener('click',function(e){if(!e.target.closest('#locsugg')&&e.target!==li)lsg.classList.remove('open');});
function chooseLoc(p){state.loc=p;li.value=p.name;lsg.classList.remove('open');$('#locclear').style.display='block';fitBB(p.bb);}
function gotoZip(z){lsg.classList.remove('open');li.value=z;$('#locclear').style.display='block';
  var go=function(){var c=_zips&&_zips[z];if(!c)return;state.loc={name:'ZIP '+z,bb:[c[0]-.18,c[1]-.22,c[0]+.18,c[1]+.22]};fitBB(state.loc.bb);};
  if(_zips)go(); else fetch(ZIP_URL).then(function(r){return r.ok?r.json():{};}).then(function(j){_zips=j;go();}).catch(function(){});}
$('#locclear').addEventListener('click',function(){state.loc=null;li.value='';this.style.display='none';if(state.code)fitAll(curRows);});
var curRows=[],curProc=null,curMid=0,curLo=0,curHi=0;
function render(){
  var lc=$('#listcol'),cnt=$('#cnt');
  if(!state.code){
    drawMarkers(null);
    cnt.innerHTML='<b>'+D.hospitals.length.toLocaleString()+'</b> hospitals in Aetna&rsquo;s network nationwide &middot; pick a procedure to see prices';
    lc.innerHTML='<div class="empty"><div class="big">Search a procedure to shop prices</div><div class="sm">Every dot is a hospital in Aetna&rsquo;s network. Choose a procedure and a plan, and each hospital shows what Aetna&rsquo;s own file says it pays &mdash; cheapest first.</div>'
      +'<div class="pilllane">'+D.procedures.slice(0,8).map(function(p){return '<span class="pill" data-code="'+p.code+'">'+esc(p.label)+'</span>';}).join('')+'</div></div>';
    $$('.pill').forEach(function(b){b.addEventListener('click',function(){choose(b.getAttribute('data-code'));});});
    return;
  }
  // gather ALL priced hospitals for the code (compact flat [hidx,medc,mnc,mxc,n,...] in cents; hospitals by index).
  var proc=catalog.filter(function(x){return x.code===state.code;})[0]||{code:state.code,label:state.code};
  var rows;
  if(state.tail){ rows=(tailCache[state.code]||[]).slice(); }
  else { var flat=(D.rates[state.code]||{})[state.plan]||[]; rows=[];
    for(var fi=0;fi<flat.length;fi+=5){var h=D.hospitals[flat[fi]];if(!h)continue;
      var netlab=state.plan==='A'?(h.nets&&h.nets.length?h.nets[0]:'Aetna'):D.networks[+state.plan].name;
      rows.push({h:h,med:flat[fi+1],mn:flat[fi+2],mx:flat[fi+3],n:flat[fi+4],net:netlab});}}
  if(state.ftype)rows=rows.filter(function(r){return r.h.type===state.ftype;});
  curRows=rows; curProc=proc;
  var allmed=rows.map(function(r){return r.med;}).sort(function(a,b){return a-b;});
  curMid=allmed.length?allmed[Math.floor(allmed.length/2)]:0; curLo=allmed[0]||0; curHi=allmed[allmed.length-1]||0;
  drawMarkers(rows.map(function(r){return {h:r.h,med:r.med};}));   // all priced hospitals on the map
  if(state.loc){ fitBB(state.loc.bb); } else { fitAll(rows); }     // fit to active location, else nationwide
  renderList();                                                    // list = viewport-filtered (moveend re-calls it)
}
// renderList: cards for hospitals in the CURRENT map viewport, cheapest-first (Airbnb "search as I move the map")
function renderList(){
  if(!state.code)return;
  var lc=$('#listcol'),cnt=$('#cnt'),proc=curProc,midM=curMid;
  var bnds=map.getBounds();
  var inview=curRows.filter(function(r){return bnds.contains([r.h.lat,r.h.lon]);});
  if(sortMode==='price')inview.sort(function(a,b){return a.med-b.med;});
  else inview.sort(function(a,b){return a.h.nm.localeCompare(b.h.nm);});
  drawPills(inview);   // Airbnb price bubbles — drawPills declutters (non-overlapping, cheapest-first, capped)
  var vmed=inview.map(function(r){return r.med;}).sort(function(a,b){return a-b;});
  cnt.innerHTML='<b>'+inview.length.toLocaleString()+'</b>'+(inview.length<curRows.length?' of '+curRows.length.toLocaleString():'')
    +' hospitals price <b>'+esc(proc.label)+'</b> ('+state.code+') '
    +(state.plan==='A'?'':'under <b>'+esc(D.networks[+state.plan].name)+'</b> ')
    +(state.loc?'near <b>'+esc(state.loc.name)+'</b>':(inview.length<curRows.length?'in this area':'nationwide'))
    +(inview.length?' &middot; typical <b>'+money(vmed[Math.floor(vmed.length/2)])+'</b> &middot; '+money(vmed[0])+'&ndash;'+money(vmed[vmed.length-1]):'');
  var CAP=250, shown=inview.slice(0,CAP), lo=curLo, hi=curHi, span=(hi-lo)||1;
  var head='<div class="sortbar"><span class="t">'+inview.length.toLocaleString()+' hospitals</span>'
    +'<div class="lens"><button data-s="price" class="'+(sortMode==='price'?'on':'')+'">Cheapest</button><button data-s="name" class="'+(sortMode==='name'?'on':'')+'">A&ndash;Z</button></div>'
    +'<div class="leg">cheap<div class="bar"></div>costly</div></div>';
  if(!inview.length){lc.innerHTML=head+'<div class="empty"><div class="big">No hospitals in view</div><div class="sm">Zoom out or search a different area &mdash; every priced hospital is on the map.</div></div>';return;}
  lc.innerHTML=head+shown.map(function(r,i){var t=(r.med-lo)/span;var col=colorFor(t);
    return '<div class="hcard" data-npi="'+r.h.npi+'"><div class="rank">'+(i+1)+'</div>'
      +'<div class="body"><div class="nm">'+esc(r.h.nm)+'</div><div class="loc">'+esc(hloc(r.h))+'</div>'
      +'<span class="net">'+esc(r.net)+'</span>'+(r.h.type?'<span class="ftype">'+esc(r.h.type)+'</span>':'')+dealBadge(r.med,midM)+'</div>'
      +'<div class="price"><div class="p" style="color:'+col+'">'+money(r.med)+'</div>'
      +(r.mn!==r.mx?'<div class="r">'+money(r.mn)+'&ndash;'+money(r.mx)+'</div>':'<div class="r">'+r.n+' rate'+(r.n>1?'s':'')+'</div>')
      +'<div class="swatch" style="background:'+col+'"></div></div></div>';
  }).join('')+(inview.length>CAP?'<div class="count" style="text-align:center">showing cheapest '+CAP+' of '+inview.length.toLocaleString()+' in view</div>':'');
  $$('.hcard').forEach(function(c){var npi=c.getAttribute('data-npi');
    c.addEventListener('mouseenter',function(){Object.keys(pills).forEach(function(k){var ic=pills[k]._icon,bb=ic&&ic.querySelector('b');if(bb)bb.classList.toggle('on',k===String(npi));});});
    c.addEventListener('click',function(){highlight(npi,false);});});
  $$('.sortbar .lens button').forEach(function(b){b.addEventListener('click',function(){sortMode=b.getAttribute('data-s');renderList();});});
}
var _mvT=null; map.on('moveend',function(){ if(!state.code)return; clearTimeout(_mvT); _mvT=setTimeout(renderList,140); });
$('#foot').innerHTML='<b>'+esc(D.entity)+'</b> &middot; '+esc(D.entity_type)+' &middot; Transparency-in-Coverage in-network rates, file dated '+esc(D.updated)+' (v'+esc(D.version)+'). '
  +'Prices are Aetna&rsquo;s own published negotiated rates (institutional / facility component), captured penny-exact and proven <b>serve == capture == source</b> over all '+D.src_rows.toLocaleString()+' rate rows. '
  +'Hospitals located by NPPES; a hospital is shown when its NPI appears in Aetna&rsquo;s provider file and geocodes to a US rooftop. '
  +'Not a bill or a quote. Identification only; no affiliation with or endorsement by Aetna is implied.';
render();
}
(function(){var lc=document.getElementById('listcol');if(lc)lc.innerHTML='<div class="empty"><div class="big">Loading prices…</div><div class="sm">Fetching Aetna’s published rates.</div></div>';})();
fetch(DATA_URL,{cache:'default'}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(d){D=d;boot();}).catch(function(e){var lc=document.getElementById('listcol');if(lc)lc.innerHTML='<div class="empty"><div class="big">Couldn’t load prices</div><div class="sm">'+String((e&&e.message)||e)+'</div></div>';});
})();
</script>
</body></html>
