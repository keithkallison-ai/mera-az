<!doctype html><html lang=en data-theme=dark><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Mera — Kohala Hospital</title><script>try{var _t=localStorage.getItem("mera_hi_theme");if(_t)document.documentElement.dataset.theme=_t;}catch(e){}</script><style>

[data-theme=light] .lgrid th,[data-theme=light] .lgrid td{border-color:#e6e9ef}

.lgrid .lhd th{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.02em;background:#0d1119;font-weight:700}
[data-theme=light] .lgrid .lhd th{background:#f0f2f6}
.lgrid .lfl td{padding:0;height:6px}
.lgrid .lfl .fb{height:6px;background:var(--ac)}
.lgrid .lrl{background:#0d1119;color:var(--tx2);font-family:Inter,sans-serif;font-size:10.5px;font-weight:700;min-width:120px;max-width:120px;white-space:normal;line-height:1.25;border-right:2px solid var(--line2)}
[data-theme=light] .lgrid .lrl{background:#f0f2f6}
.lgrid td.cell{color:var(--tx3);min-width:58px;max-width:150px;overflow:hidden;text-overflow:ellipsis;transition:background .18s}

/* every lens's legend is built ONCE and lives in the DOM; switching lens toggles which set is shown.
   Rebuilding the chip row's innerHTML on each switch cost a parse + style + layout on the click. */
/* All four lens legends are STACKED IN ONE GRID CELL and only the active one is visible. Toggling display:none
   was ADDING AND REMOVING the whole chip set from layout on every switch (Chrome's invalidation trace: 96 text
   nodes + 40 buttons + 34 chips "Added/Removed from layout"). visibility costs no layout at all. */
.llegend{display:grid;align-items:center;margin:0;flex:1 1 0;min-width:0}   /* takes the rest of the row so the LEGEND label stays inline */
/* EVERY lens's legend is the same height. The flag chips carry ▲▼ and are 40px tall; the type/fill chips are
   ~24px. That 20px difference moved the grid, the minimap and everything below it on every lens switch, AND
   changed the pane's scrollHeight — which retriggers the carousel's ResizeObserver -> fit() -> a forced layout
   of the whole audit pane. A UI that jumps when you click reads as lag. Pin the height: nothing moves. */
.lgset{grid-area:1/1;display:flex;align-items:center;flex-wrap:wrap;gap:9px 12px;font-size:11px;color:var(--tx2);min-height:40px;visibility:hidden}
.lgset.on{visibility:visible}
.llegend span{display:flex;align-items:center;gap:6px}
.llegend i{width:11px;height:11px;border-radius:3px;flex:0 0 auto;border:1px solid var(--line2)}
.llegend b{font-family:JetBrains Mono,monospace;color:var(--tx);font-weight:700;font-size:11px}
/* NO transition on the selected state — a chip must light up the instant it is clicked (a 120ms fade reads as lag).
   contain:paint — without it, hovering a chip made Chrome re-record the display list for the ENTIRE audit pane
   (7.8M px2), once per mouse move. Containment bounds the invalidation to the chip itself. */
.lgd.sel{cursor:pointer;border:1px solid transparent;border-radius:8px;padding:2px 5px 2px 7px;user-select:none;contain:paint}
.lgd.sel:hover{background:rgba(255,255,255,.05)}
[data-theme=light] .lgd.sel:hover{background:rgba(16,24,40,.05)}
.lgd.sel.solo{border-color:var(--fc);background:color-mix(in srgb,var(--fc) 18%,transparent)}
/* the ▲▼ live in the chip and are ALWAYS present — inert until their flag is selected, so nothing has to appear */
/* two classes, so this beats `.llegend span` (1 class + 1 element) — that rule was forcing a 6px gap into the stack */
.llegend .jbtns{display:inline-flex;flex-direction:column;gap:2px;margin-left:5px;vertical-align:middle;opacity:.22;pointer-events:none}
.lgd.walk.solo .jbtns{opacity:1;pointer-events:auto}
.jbtn{background:#141b28;border:1px solid var(--line2);color:var(--tx2);border-radius:4px;width:28px;height:16px;cursor:pointer;font-size:9px;line-height:1;transition:border-color .1s,color .1s,background .1s;padding:0;display:flex;align-items:center;justify-content:center;contain:paint}
.jbtn:hover{border-color:#FF5A1F;color:#FF5A1F}
.jbtn:active{background:#FF5A1F;color:#0b0e13;border-color:#FF5A1F}
[data-theme=light] .jbtn{background:#eef2f7}
[data-theme=light] .jbtn:active{color:#fff}
/* ⛔ The card and the tip are moved on EVERY mouse move. Positioned with left/top and toggled with display, each
   move forced a layout + a PAINT OF THE WHOLE AUDIT PANE (measured: every Paint event was 1512x5167 = 7.8M px2,
   the entire pane, ~35 of them per interaction). They are now always laid out, promoted to their own compositing
   layer, hidden with visibility, and moved with transform — so a move is a compositor job: no layout, no paint. */
.evcard{position:fixed;left:0;top:0;visibility:hidden;z-index:10000;pointer-events:none;max-width:322px;background:#0d1119;border:1px solid var(--line2);border-radius:13px;padding:13px 15px;box-shadow:0 18px 50px rgba(0,0,0,.5);opacity:0;transition:opacity .1s;will-change:transform,opacity;transform:translate3d(0,0,0);contain:layout paint}
[data-theme=light] .evcard{background:#fff;box-shadow:0 18px 50px rgba(16,24,40,.16)}
.evh{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:var(--tx);letter-spacing:-.01em}
.evh i{width:11px;height:11px;border-radius:3px;background:var(--ec);flex:0 0 auto}
.evw{font-family:JetBrains Mono,monospace;font-size:12.5px;font-weight:700;color:var(--tx);margin:8px 0 6px}
.evwhy{font-size:12px;color:var(--tx2);line-height:1.5}
.evp{display:flex;flex-direction:column;gap:3px;margin:10px 0 4px;border-top:1px solid var(--line);padding-top:9px}
.evpr{display:flex;justify-content:space-between;gap:14px;font-size:11.5px}
.evpr b{color:var(--tx3);font-weight:600}

/* BOTH portraits ship in the DOM and decode once at load; a lens switch just flips opacity. Re-assigning
   pimg.src on every switch forced a fresh PNG decode — a lens change must not wait on an image.
   will-change:opacity is NOT cosmetic: without it these two 714x900 PNGs (drawn into a ~150px rail) get
   RE-RASTERED on every opacity flip, on the main thread. MEASURED at 6x CPU throttle: removing the portraits
   entirely cut the worst-case lens switch from 128ms to 80ms. Promoting them to their own compositing layer
   makes the flip a compositor job — zero raster, zero main-thread work. It was the last real cost in a switch. */

      _put(gtip,Math.min(_mx+14,window.innerWidth-tw-8),Math.max(8,_my-th-10)); gtip.style.opacity='1'; }); }
  gcanvas.addEventListener('mouseleave',()=>{ if(!rz){ hideTips(); hideCard(); } });
  gcanvas.addEventListener('mousedown',e=>{ const r=gcanvas.getBoundingClientRect(); const hb=hitBorder(e.clientX-r.left,e.clientY-r.top,bscroll.scrollLeft,bscroll.scrollTop); if(!hb) return;
    e.preventDefault(); hideCard(); hideTips(); document.body.style.userSelect='none';
    rz = hb.type==='col' ? {type:'col',j:hb.j,x0:e.clientX,w0:CW[hb.j]} : {type:'row',o:hb.o,y0:e.clientY,h0:RH}; });
  // draw() used to run straight out of this handler — one FULL redraw per mouse EVENT rather than per frame. Coalesce
  // to one update per FRAME (the minimap drag's proven pattern). MEASURED HONESTLY: this changes nothing on Chrome,
  // which already delivers about one mousemove per frame — it is a CAP on the worst case (a device or engine that
  // delivers more), not a speedup. The real defect in this handler was setRowH's clamp; see rowHMax().
  function rzApply(x,y){
    if(rz.type==='col'){ CW[rz.j]=Math.max(34,Math.round(rz.w0+(x-rz.x0))); recomputeX(); }
    else setRowH(rz.h0+(y-rz.y0)/(rz.o+1));
    syncSpace(); draw(); }
  function rzQueue(x,y){ _rzXY=[x,y]; if(_rzRaf) return;
    _rzRaf=requestAnimationFrame(()=>{ _rzRaf=0; const q=_rzXY; _rzXY=null; if(q&&rz) rzApply(q[0],q[1]); }); }
  window.addEventListener('mousemove',e=>{ if(rz) rzQueue(e.clientX,e.clientY); });
  window.addEventListener('mouseup',()=>{ if(rz){ rz=null; document.body.style.userSelect=''; gcanvas.style.cursor='default'; } });
  // EVERY lens's legend is built ONCE, up front, and all of them live in the DOM. Switching a lens toggles which set
  // is shown — no innerHTML, no parse, no re-layout on the click. (Rebuilding the row per switch was one of the three
  // things that made a lens change feel slow; the other two were the 180ms button transition and the minimap re-decode.)
  // A flag chip carries its OWN ▲▼ — always rendered, inert until that flag is selected. Nothing has to appear on
  // click: no control materialises, no layout shift, no wait. The chip's own text never changes either (the step
  // position goes on the evidence card that pops at the cell), so stepping never reflows the legend row.
  const _chip=(k,nm,f,a)=>{ const c=FCLR[k]||'var(--line2)', n=(a||[]).length;
    return '<span class="lgd sel'+(n?' walk':'')+'" data-sel="'+nm+'" data-tip="'+f.note.replace(/"/g,'&quot;')+'" style="--fc:'+c+'">'
      +'<i style="background:'+c+'"></i>'+f.label+' <b>'+f.count+'</b>'
      +'<span class=jbtns'+(n?'':' title="this file has none"')+'><button class=jbtn data-d="-1" title="previous (p / ↑)">▲</button><button class=jbtn data-d="1" title="next (n / ↓)">▼</button></span></span>'; };
  function buildLegends(){ const lg=document.getElementById('llegend'); if(!lg) return;
    const TIP='Show only this value type. Click another to add it — the selection adds up. Click a selected one again to drop it.';
    const sets={
      fill:(LEG.fill||[]).map(x=>'<span><i style="background:'+x[1]+'"></i>'+x[0]+'</span>').join(''),
      type:LEG.type.map(x=>'<span class="lgd sel" data-sel="'+x[2]+'" data-tip="'+TIP+'" style="--fc:'+x[1]+'"><i style="background:'+x[1]+'"></i>'+x[0]+'</span>').join(''),
      flag:FCHIPS.map(k=>{ const f=FIND.find(x=>x.key===k), nm=FKEY2FLAG[k]||k; return f?_chip(k,nm,f,FIDX[nm]):''; }).join(''),
      claims:CCHIPS.map(kv=>{ const f=FIND.find(x=>x.key===kv[0]); return f?_chip(kv[0],kv[1],f,CIDX[kv[1]]):''; }).join('')};
    lg.innerHTML=Object.keys(sets).map(l=>'<div class=lgset data-lens="'+l+'">'+sets[l]+'</div>').join(''); }
  function showLegend(){ const lg=document.getElementById('llegend'); if(!lg) return;
    lg.querySelectorAll('.lgset').forEach(s=>s.classList.toggle('on',s.getAttribute('data-lens')===curLens));
    markSel(); }
  function markSel(){ const lg=document.getElementById('llegend'); if(!lg) return; const s=sel();
    const set=lg.querySelector('.lgset.on'); if(!set) return;
    set.querySelectorAll('.lgd[data-sel]').forEach(e=>e.classList.toggle('solo', s.has(e.getAttribute('data-sel')))); }
  // ⛔ A CLICK MUST NEVER WAIT ON THE CANVAS. draw() used to run SYNCHRONOUSLY inside the click handler, so the
  // button, the legend and the minimap could not paint until the whole grid had been re-rendered — if the canvas
  // is ever slow on a given machine, the entire UI freezes with it, and the switch reads as laggy no matter how
  // fast the DOM part is. Now the controls paint in THIS frame and the grid redraws in the NEXT one: the control
  // always answers in one frame, and the grid follows. (One frame = ~16ms apart; imperceptible.)
  let _dRaf=0;
  function drawSoon(){ if(_dRaf) return; _dRaf=requestAnimationFrame(()=>requestAnimationFrame(()=>{ _dRaf=0; draw(); })); }
  function onSel(){ focusCell=null; markSel(); drawSoon(); }               // a selection changed: class toggle now, repaint next frame
  function setLens(l){ curLens=l; focusCell=null;
    xr.querySelectorAll('.lens button').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
    const sig=(l==='flag'||l==='claims');                                  // both portraits are already decoded — just flip them
    if(pimg) pimg.style.opacity=sig?'0':'1';
    if(pimgs) pimgs.style.opacity=sig?'1':'0';
    showLegend(); drawSoon(); }                                            // each lens keeps its own selection
  xr.querySelectorAll('.lens button').forEach(b=>b.addEventListener('click',()=>setLens(b.dataset.l)));
  // Stepping a flag was producing 67ms LONG FRAMES (measured): goTo scrolled, redrew the whole canvas AND rebuilt
  // the evidence card's innerHTML, all inside the click. Scroll now, redraw next frame, card after that — so an
  // arrow tap answers immediately instead of stalling the frame.
  function goTo(o,j){ progScrollTs=performance.now(); focusCell={o:o,j:j};
    bscroll.scrollTop=Math.max(0,HDR+o*RH-bscroll.clientHeight/2);
    bscroll.scrollLeft=Math.max(0,XOFF[j]-bscroll.clientWidth/2+CW[j]/2);
    drawSoon(); place('jumpcard',()=>showCardAt(o,j)); }
  // ▲/▼ on a chip steps that chip's OWN flag. Its list is precomputed, so a step is a lookup — no scan, no DOM built.
  function step(nm,dir){ const a=idxOf(nm); if(!a.length) return;
    const i=((NAVI[nm]==null?-1:NAVI[nm])+dir+a.length)%a.length; NAVI[nm]=i; lastNav=nm;
    _navPos='<b>'+(i+1).toLocaleString()+' of '+a.length.toLocaleString()+'</b> · ';   // "3 of 1,110" rides on the card, not the chip
    const c=a[i]; goTo(c[0],c[1]); }                                       // the card is built in goTo's deferred frame
  { const _lg=document.getElementById('llegend'); if(_lg) _lg.addEventListener('click',e=>{
      const btn=e.target.closest('.jbtn');                                 // an arrow steps its flag — it never toggles the selection
      if(btn){ const c=btn.closest('.lgd[data-sel]'); if(c) step(c.getAttribute('data-sel'),parseInt(btn.getAttribute('data-d'),10)); return; }
      const el=e.target.closest('.lgd[data-sel]'); if(!el) return;
      const k=el.getAttribute('data-sel'), s=sel();
      if(s.has(k)){ s.delete(k); NAVI[k]=null; if(lastNav===k) lastNav=null; }   // ADDITIVE: toggle, never replace
      else { s.add(k); if(walkable(k)) lastNav=k; }
      onSel(); }); }
  document.addEventListener('keydown',e=>{ if(!lastNav||!sel().has(lastNav)) return; if(e.target&&/^(INPUT|TEXTAREA)$/.test(e.target.tagName)) return;
    if(e.key==='n'||e.key==='ArrowDown'){ step(lastNav,1); e.preventDefault(); } else if(e.key==='p'||e.key==='ArrowUp'){ step(lastNav,-1); e.preventDefault(); } });
  // ---- CODE-CLICK → the Browse per-code page (Founder 2026-07-14). A click on a code cell opens
  // that code's pricing page in Browse. Text rows only (RH>=12): below that a click cannot honestly
  // attribute a cell. Codes without a negotiated lane have no browse page — the click SAYS SO
  // instead of doing nothing. The 280ms defer lets a double-click (reserved for zoom dives in
  // derived serves) cancel the jump. Serves without a Browse division (typeof codePage/slideTo
  // undefined — e.g. Leahi) get NO behavior and NO pointer cursor.
  let _clkT=0, _lastDbl=0, _mdX=0, _mdY=0;
  gcanvas.addEventListener('mousedown',e=>{ _mdX=e.clientX; _mdY=e.clientY; });
  gcanvas.addEventListener('dblclick',()=>{ _lastDbl=performance.now(); clearTimeout(_clkT); });
  gcanvas.addEventListener('click',e=>{
    if(typeof codePage!=='function'||typeof slideTo!=='function') return;
    if(RH<12 || rz) return;
    if(Math.abs(e.clientX-_mdX)>4||Math.abs(e.clientY-_mdY)>4) return;   // a drag is not a click
    const r=_grect(), mx=e.clientX-r.left, my=e.clientY-r.top;
    if(mx<GUT||my<HDR) return;
    const st=bscroll.scrollTop, sl=bscroll.scrollLeft;
    const o=Math.floor((st-HDR+my)/RH); if(o<0||o>=NR) return;
    let j=-1; for(let k=0;k<CW.length;k++){ const x=XOFF[k]-sl; if(mx>=x&&mx<x+CW[k]){ j=k; break; } }
    if(j<0||GCT[j]!=='code') return;
    const code=String(gval(o,j)||''); if(!code) return;
    const ct=(j+1<GCT.length&&GCT[j+1]==='ctype')?String(gval(o,j+1)||''):'';
    const cx=e.clientX, cy=e.clientY;
    clearTimeout(_clkT);
    _clkT=setTimeout(()=>{ if(performance.now()-_lastDbl<350) return;    // a dive owns rapid taps
      if(codePage(code,ct,0)!==false){
        try{ lastCP=code+'|'+ct+'|'+CP.vi; }catch(_e){}
        try{ history.replaceState('','','#c/'+ct+':'+encodeURIComponent(code)); }catch(_e){}
        slideTo(1,false);
        setTimeout(()=>{ const c=document.getElementById('cpcard'); if(c) c.scrollIntoView({behavior:'smooth',block:'start'}); },520);
      } else {
        gtip.textContent='no per-code page — '+code+(ct?' ('+ct+')':'')+' carries no negotiated rate in this file';
        if(!_tipOn){ _tipOn=true; gtip.style.visibility='visible'; }
        place('gtip',()=>{ const tw=gtip.offsetWidth,th=gtip.offsetHeight;
          _put(gtip,Math.min(cx+14,window.innerWidth-tw-8),Math.max(8,cy-th-10)); gtip.style.opacity='1'; });
        setTimeout(hideTips,1800);
      } },280); });
  resize();
  buildLegends();
  setLens((D.xray&&D.xray.default_lens)||'flag');
  }).catch(e=>{ if(pread) pread.textContent='Could not load the full file: '+(e&&e.message||e); });
})();

</script></body></html>
