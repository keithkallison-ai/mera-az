function scatterChart(id,hi,active){
 kill(id);if(!SCATTER){document.getElementById(id).parentNode.innerHTML='<div class="spin">loading points…</div>';return;}
 const pts=SCATTER[DATA.hospitals[hi].label]||[];
 const ds=Object.keys(active).filter(k=>active[k]).map(k=>({label:PNAME[k],data:pts.filter(p=>p.r[k]).map(p=>({x:p.b,y:p.r[k],c:p.c,d:p.d})),backgroundColor:PCOL[k]+'c0',borderColor:PCOL[k],pointRadius:2.6,pointHoverRadius:6,pointHoverBackgroundColor:'#fff'}));
 CH[id]=new Chart(document.getElementById(id),{type:'scatter',data:{datasets:ds},options:{responsive:true,maintainAspectRatio:false,animation:{duration:500},
  interaction:{mode:'nearest',intersect:true},
  scales:{x:{type:'logarithmic',...AX('hospital base price for the code  ($, log)')},y:{type:'logarithmic',...AX('payer\'s negotiated price  ($, log)')}},
  plugins:{legend:{labels:{usePointStyle:true,pointStyle:'circle',padding:16,color:'#c9d1d9'}},
   tooltip:{backgroundColor:'#0d1219',borderColor:'#28313f',borderWidth:1,padding:11,titleColor:'#f0f6fc',bodyColor:'#aab4c4',
    callbacks:{title:c=>c[0].raw.c+'  '+(c[0].raw.d||''),label:c=>'base $'+c.raw.x.toLocaleString()+'  →  $'+c.raw.y.toLocaleString()+'   ('+(c.raw.y/c.raw.x).toFixed(2)+'× base)'}}}}});
}
function dialChart(id,hi){

  options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,onClick:(e,el)=>{if(el.length)selp(hi,ps[el[0].index].name);},

function selp(hi,pname){
 const h=DATA.hospitals[hi],p=h.payers.find(x=>x.name==pname);if(!p)return;
 const el=document.getElementById('pdetail');if(!el)return;
 el.innerHTML='<h2 class="s">'+p.name+' — how its prices are built</h2><div class="grid2"><div><div class="cv" style="height:'+(Math.max(120,p.plans.length*34+30))+'px"><canvas id="cpl"></canvas></div><div class="note" style="margin-top:0">Each bar is one of this insurer\'s <b class="b">plans</b> (Commercial, Medicare, Exchange…), each priced as one flat multiple of the hospital\'s base schedule.</div></div><div><div class="cv" style="height:200px"><canvas id="csl"></canvas></div><div class="note tl" style="margin-top:0">Each bar is what this insurer pays for one <b>service line</b>, × the base. <b>Flat across all</b> → a single multiplier covers everything, so one number defines the whole plan (UHC works this way). <b>Big swings</b> → it prices departments differently, paying up for some (imaging, labs) and discounting others (surgery) — that\'s Cigna.</div></div></div>';
 kill('cpl');kill('csl');
 if(p.plans.length){CH['cpl']=new Chart(document.getElementById('cpl'),{type:'bar',data:{labels:p.plans.map(x=>x.plan),datasets:[{data:p.plans.map(x=>x.mult),backgroundColor:'#a78bfac0',borderColor:'#a78bfa',borderWidth:1,borderRadius:5}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,scales:{x:AX('× base'),y:{grid:{display:false},ticks:{color:'#c9d1d9'}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.x.toFixed(2)+'×'}}}}});}
 const lk=Object.keys(p.lines);
 if(lk.length){CH['csl']=new Chart(document.getElementById('csl'),{type:'bar',data:{labels:lk,datasets:[{data:lk.map(k=>p.lines[k]),backgroundColor:'#fbbf24c0',borderColor:'#fbbf24',borderWidth:1,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:AX('× line floor'),x:{grid:{display:false},ticks:{color:'#c9d1d9'}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y.toFixed(2)+'×'}}}}});}
 el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

 '<div class="tiles">'+tile(DATA.hospitals.length,'hospitals decomposed')+tile('555','payer profiles')+tile((TOTAL/1e6).toFixed(1)+'M','distinct (code,payer) cells')+tile('≈0%','truly negotiated')+'</div>'+
 '<h2 class="s" style="margin-top:30px">Start here</h2><div class="grid3">'+

 navcard('⌂','Hospitals','All 26, each decomposed into its mechanisms with interactive charts.','#hospitals')+
 navcard('◫','Payers','Every national insurer\'s multiplier across all 26 hospitals, as a heatmap.','#payers')+
 navcard('∑','The Calculator','rate = base × scalar × adjustment, shown live.','#calculator')+'</div>';
}

 return '<h1 class="t">The Calculator</h1><div class="lead">A payer\'s rates aren\'t scattered — they fall on lines. Each line is one product priced as a flat multiple of the hospital\'s base schedule. Hover the points.</div>'+
 '<div class="formula" style="margin-bottom:16px">rate = <b>base[code]</b> × <i>scalar[payer]</i> × <u>adj[service&#8209;line]</u>  +  tiers · %&#8209;charges · drugs</div>'+
 '<div class="card"><h2 class="s">Live — '+DATA.hospitals[EXH].label+' · 3 payers · real points</h2><div class="cv" style="height:430px"><canvas id="ccalc"></canvas></div></div>'+
 '<div class="card"><h2 class="s">The six mechanisms</h2>'+
 mech('#34d399','Fee-schedule lattice','base[code] × per-payer scalar — the lines above.')+
 mech('#38bdf8','Case-rate tiers','one flat $ stamped across many codes (a bundle). ~30–40% of a HonorHealth file.')+
 mech('#a78bfa','%-of-charges','gross × a contracted % (often one exact % per payer). Banner: ~44% of cells.')+
 mech('#fbbf24','Drug table (ASP)','J/Q codes priced per-unit on acquisition cost — a separate calculator.')+
 mech('#818cf8','MS-DRG','inpatient bundles: base × DRG weight × scalar.')+
 mech('#fb7185','Poison + residual','placeholders (CAR-T at $2.99), unit errors, and a <1% no-benchmark residue.')+'</div>';
}

 const modpills=modsAvail.map(m=>'<span class="pill mpill '+(IMGMOD==m?'on':'')+'" onclick="setMod(\''+m+'\')">'+m+'</span>').join('');
 const planpills=Object.keys(PCOL).map(k=>'<span class="chip '+(IMGPLAN==k?'on':'')+'" onclick="setPlan(\''+k+'\')"><span class="d" style="background:'+PCOL[k]+'"></span>'+PNAME[k]+'</span>').join('');
 const extras=['Spine','Breast','Heart'].filter(r=>IMG.regions[r]).map(r=>{const av=imgAvail(r);return '<span class="pill rchip '+(IMGREG==r?'on':'')+(av?'':' dis')+'"'+(av?' onclick="pickReg(\''+r+'\')"':'')+'>'+r+'</span>';}).join('');
 setTimeout(imgChart,30);
 const cell=IMG.regions[IMGREG]&&IMG.regions[IMGREG][IMGMOD];
 let right;
 if(!cell){right='<div class="card"><div class="note">No '+IMGMOD+' of the '+IMGREG.toLowerCase()+' is published as a comparable code here. Pick another modality or part.</div></div>';}
 else{
  const med=a=>{a=a.filter(Boolean).sort((x,y)=>x-y);return a.length?a[Math.floor(a.length/2)]:null;};
  const hhP=cell.hosp.filter(h=>h.sys=='hh').map(h=>h.r[IMGPLAN]).filter(Boolean);
  const bnP=cell.hosp.filter(h=>h.sys=='bn').map(h=>h.r[IMGPLAN]).filter(Boolean);
  const allP=bnP.concat(hhP.length?[med(hhP)]:[]).filter(Boolean).sort((a,b)=>a-b);
  const stat=allP.length?'<div class="istat"><div><span class="k">low</span><b>$'+Math.round(allP[0])+'</b></div><div><span class="k">typical</span><b>$'+Math.round(allP[Math.floor(allP.length/2)])+'</b></div><div><span class="k">high</span><b>$'+Math.round(allP[allP.length-1])+'</b></div><div><span class="k">facilities</span><b>'+(hhP.length?'HH + ':'')+bnP.length+' Banner</b></div></div>':'';
  const vchips=(cell.vars||[]).map(v=>'<span class="vchip'+(v.rep?' rep':'')+'" title="'+v.c+' '+(v.d||'')+'">'+(v.v||v.c)+' · $'+Math.round(v.p)+'</span>').join('');
  right='<div class="card imgresult"><div class="ititle">'+IMGREG+' '+IMGMOD+'</div><div class="muted" style="font-size:13px">'+cell.label+' · code '+cell.rep+'</div>'+stat+
   '<div class="vrow">'+vchips+'</div>'+
   '<h2 class="s" style="margin-top:18px">'+PNAME[IMGPLAN]+' price by hospital</h2><div class="cv" style="height:'+((bnP.length+(hhP.length?1:0))*26+50)+'px"><canvas id="cimg"></canvas></div>'+
   '<div class="note"><b style="color:#a78bfa">Purple = Banner</b> facilities (each negotiates its own) · <b style="color:#34d399">green = HonorHealth</b> (all 9 campuses priced the same → collapsed to one bar). Click a bar to open that hospital. That spread is the real cross-system shopping.</div></div>';}
 return '<h1 class="t">Imaging</h1><div class="lead">Pick how you\'re being scanned, then click the body part — the anatomy is the menu, not a code list. Below: that scan\'s price across <b class="b">HonorHealth and Banner</b>, under your plan.</div>'+
  '<div class="toolbar">'+modpills+'</div>'+
  '<div class="toolbar" style="margin-top:-4px"><span class="muted" style="font-size:12px;margin-right:2px">your plan</span>'+planpills+'</div>'+
  '<div class="bodywrap"><div class="bodycol"><div class="bodyhint">'+IMGMOD+' · green = available</div>'+bodySvg()+'<div class="vrow" style="justify-content:center;margin-top:12px">'+extras+'</div></div><div class="rescol">'+right+'</div></div>';}
function imgChart(){
 const cell=IMG&&IMG.regions[IMGREG]&&IMG.regions[IMGREG][IMGMOD];if(!cell)return;
 const med=a=>{a=a.filter(Boolean).sort((x,y)=>x-y);return a.length?a[Math.floor(a.length/2)]:null;};
 const hh=cell.hosp.filter(h=>h.sys=='hh'&&h.r[IMGPLAN]), bn=cell.hosp.filter(h=>h.sys=='bn'&&h.r[IMGPLAN]);
 let rows=bn.map(h=>({label:h.h.replace('Banner ',''),v:h.r[IMGPLAN],sys:'bn',hi:DATA.hospitals.findIndex(x=>x.label==h.h)}));
 if(hh.length)rows.push({label:'HonorHealth ('+hh.length+')',v:med(hh.map(h=>h.r[IMGPLAN])),sys:'hh',hi:DATA.hospitals.findIndex(x=>x.label==hh[0].h)});
 rows.sort((a,b)=>a.v-b.v);
 kill('cimg');const cv=document.getElementById('cimg');if(!cv)return;
 if(!rows.length){cv.parentNode.innerHTML='<div class="note">'+PNAME[IMGPLAN]+' doesn\'t price this scan at the sampled hospitals — try another plan.</div>';return;}
 CH['cimg']=new Chart(cv,{type:'bar',data:{labels:rows.map(r=>r.label),datasets:[{data:rows.map(r=>r.v),backgroundColor:rows.map(r=>r.sys=='hh'?'#34d399c0':'#a78bfac0'),borderColor:rows.map(r=>r.sys=='hh'?'#34d399':'#a78bfa'),borderWidth:1,borderRadius:5}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,onClick:(ev,el)=>{if(el.length&&rows[el[0].index].hi>=0)location.hash='#hospital/'+rows[el[0].index].hi;},scales:{x:Object.assign(AX('$ '+PNAME[IMGPLAN]+' pays'),{ticks:{color:'#69748a',callback:v=>'$'+v}}),y:{grid:{display:false},ticks:{color:'#c9d1d9',font:{size:11}}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'$'+c.parsed.x.toLocaleString()}}}}});}
function setMod(m){IMGMOD=m;document.getElementById('content').innerHTML=imaging();}
function pickReg(r){IMGREG=r;document.getElementById('content').innerHTML=imaging();}
function setPlan(k){IMGPLAN=k;document.getElementById('content').innerHTML=imaging();}
// ---- how prices were made: the phantom base + each payer's dial, generative ----
let PH=null, PHH=null, PHSL=null;
fetch('phantom.json').then(r=>r.json()).then(d=>{PH=d;if((location.hash||'').indexOf('phantom')>=0)route();}).catch(e=>{});
const PHCOL={Aetna:'#fbbf24',Cigna:'#a78bfa',UnitedHealthcare:'#34d399',BCBS:'#fb7185',Humana:'#38bdf8',Oscar:'#f472b6','Health Choice':'#a3e635',Ambetter:'#fb923c'};
function phc(n,i){return PHCOL[n]||['#fbbf24','#a78bfa','#34d399','#fb7185','#38bdf8','#f472b6','#a3e635'][i%7];}
function dialColor(m){const st=[[0.4,[45,212,191]],[0.7,[56,189,248]],[1.0,[100,116,139]],[1.6,[251,191,36]],[3,[251,146,60]],[6,[251,113,133]]];const lm=Math.log(Math.max(0.4,Math.min(6,m)));for(let i=1;i<st.length;i++){if(lm<=Math.log(st[i][0])){const A=st[i-1],B=st[i],t=(lm-Math.log(A[0]))/(Math.log(B[0])-Math.log(A[0]));return 'rgb('+A[1].map((x,j)=>Math.round(x+t*(B[1][j]-x))).join(',')+')';}}return 'rgb(251,113,133)';}
function pickPh(i){PHH=i;PHSL=null;document.getElementById('content').innerHTML=phantomv();}
function setPhSL(sl){PHSL=sl;document.getElementById('content').innerHTML=phantomv();}
function phantomv(){
 if(!PH){setTimeout(()=>{if((location.hash||'').indexOf('phantom')>=0)route()},350);return '<h1 class="t">How these prices were made</h1><div class="card"><div class="spin">recovering the phantom…</div></div>';}
 if(PHH==null)PHH=DATA.hospitals.findIndex(h=>h.label.indexOf('Osborn')>=0);
 const label=DATA.hospitals[PHH].label, d=PH[label];
 const head='<h1 class="t">How these prices were made</h1><div class="lead">No insurer publishes it, but a single hidden <b class="b">base schedule</b> — the phantom — underlies the whole file. Every payer just multiplies it by a <b class="b">dial</b> (one knob per service line). Watch the file regenerate itself.</div><div class="toolbar">'+rolo(PHH,'pickPh')+'</div>';
 if(!d)return head+'<div class="card"><div class="note">'+label+' doesn\'t list enough commercial fee-schedule codes to recover a clean phantom (its commercial book is mostly %-of-charges or case-rate). Pick another hospital above.</div></div>';
 if(!PHSL||d.servicelines.indexOf(PHSL)<0)PHSL=d.servicelines[0];
 const slpills=d.servicelines.map(sl=>'<span class="pill '+(PHSL==sl?'on':'')+'" onclick="setPhSL(\''+sl+'\')">'+sl+'</span>').join('');
 let heat='<div class="dialgrid" style="grid-template-columns:140px repeat('+d.servicelines.length+',1fr)"><div class="dcell h"></div>'+d.servicelines.map(sl=>'<div class="dcell h">'+sl+'</div>').join('');
 d.payers.forEach((p,i)=>{heat+='<div class="dcell pl" style="color:'+phc(p,i)+'">'+p+'</div>'+d.servicelines.map(sl=>{const m=d.dials[p]&&d.dials[p][sl];return m?'<div class="dcell" style="background:'+dialColor(m)+';color:#0a0d12">'+m+'×</div>':'<div class="dcell" style="color:var(--tx3)">·</div>';}).join('');});
 heat+='</div>';
 const ex=(d.examples[PHSL]||[])[0];
 const worked=ex?'<div class="worked"><div class="wbase">'+(ex.d||ex.code)+'<span>phantom base $'+ex.base+'</span></div><div class="warrow">× the dial =</div><div class="wpayers">'+d.payers.map((p,i)=>{const dl=d.dials[p]&&d.dials[p][PHSL];return dl?'<div class="wp"><span style="color:'+phc(p,i)+';font-weight:700">'+p+'</span> ×'+dl+' = <b>$'+Math.round(ex.base*dl).toLocaleString()+'</b></div>':'';}).join('')+'</div></div>':'';
 setTimeout(phScatter,30);
 return head+
  '<div class="card"><h2 class="s">The recipe — each insurer\'s dial (× the phantom, per service line)</h2>'+heat+'<div class="note">Teal = pays below the phantom, amber/red = above. Read across a row for one insurer\'s strategy — Cigna loads labs &amp; imaging; Aetna runs cheap on radiology.</div></div>'+
  '<h2 class="s" style="margin:24px 0 9px">Watch it generate — pick a line of business</h2><div class="toolbar" style="margin-bottom:12px">'+slpills+'</div>'+
  '<div class="card"><h2 class="s">'+PHSL+' — every payer as a multiple of the phantom</h2><div class="cv" style="height:560px"><canvas id="phsc"></canvas></div><div class="note">Each dot = one real price, shown as <b>× the phantom</b>. The dashed white line is the phantom itself (1×). Every insurer sits on its own multiple — a flat tight band (labs) = pure calculator; a wide scatter (surgery) = real haggling. <b>Click an insurer in the legend</b> to hide it — the axis re-fits, spreading the rest so you can read the smaller gaps.</div></div>'+
  (worked?'<div class="card"><h2 class="s">One base → many prices</h2>'+worked+'<div class="note">The same phantom base, run through each insurer\'s dial, lands on the actual numbers in the file.</div></div>':'');
}
function phScatter(){
 const label=DATA.hospitals[PHH].label,d=PH[label];if(!d||!d.points[PHSL])return;
 const pts=d.points[PHSL],xs=pts.map(p=>p.b),xmin=Math.min.apply(0,xs),xmax=Math.max.apply(0,xs),ds=[];
 let maxd=1;
 d.payers.forEach((p,i)=>{const col=phc(p,i),pp=pts.filter(x=>x.p==p);
  ds.push({label:p,data:pp.map(x=>({x:x.b,y:x.r/x.b,r0:x.r})),backgroundColor:col+'cc',borderColor:col,pointRadius:2.6,pointHoverRadius:6,pointHoverBackgroundColor:'#fff',showLine:false});
  const dl=d.dials[p]&&d.dials[p][PHSL];
  if(dl){maxd=Math.max(maxd,dl);ds.push({label:p+'·dial',data:[{x:xmin,y:dl},{x:xmax,y:dl}],borderColor:col,borderWidth:1.7,pointRadius:0,showLine:true,fill:false,tension:0});}});
 ds.push({label:'phantom·ref',data:[{x:xmin,y:1},{x:xmax,y:1}],borderColor:'#e9edf4',borderWidth:1.4,borderDash:[6,4],pointRadius:0,showLine:true,fill:false});
 kill('phsc');CH['phsc']=new Chart(document.getElementById('phsc'),{type:'scatter',data:{datasets:ds},options:{responsive:true,maintainAspectRatio:false,
  scales:{x:{type:'logarithmic',...AX('phantom base price  ($, log)')},y:Object.assign(AX('× the phantom  (the multiple)'),{min:0,ticks:{color:'#69748a',callback:v=>v+'×'}})},
  plugins:{legend:{onClick:(e,item,lg)=>{const ci=lg.chart,i=item.datasetIndex,lbl=ci.data.datasets[i].label,vis=ci.isDatasetVisible(i);ci.setDatasetVisibility(i,!vis);ci.data.datasets.forEach((d,j)=>{if(d.label===lbl+'·dial')ci.setDatasetVisibility(j,!vis);});ci.update();},labels:{usePointStyle:true,pointStyle:'circle',color:'#c9d1d9',filter:(it)=>it.text.indexOf('·dial')<0&&it.text.indexOf('·ref')<0}},
   tooltip:{callbacks:{label:c=>c.dataset.label+':  '+(c.raw.y!=null?c.raw.y.toFixed(2):'')+'× phantom'+(c.raw.r0?'  ($'+c.raw.r0.toLocaleString()+')':'')}}}}});
}
function route(){
 const hash=location.hash.slice(1)||'overview',[v,arg]=hash.split('/');
 document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('active',a.dataset.route==v));
 Object.keys(CH).forEach(kill);if(MAP&&v!='hospitals'){MAP.remove();MAP=null;}
 const c=document.getElementById('content');
 if(v=='hospital')hospital(+arg);
 else if(v=='explore')c.innerHTML=explore();
 else if(v=='calculator')c.innerHTML=calculator();
 else if(v=='compare')c.innerHTML=compare();
 else if(v=='lattice')c.innerHTML=lattice();
 else if(v=='imaging')c.innerHTML=imaging();
 else if(v=='phantom')c.innerHTML=phantomv();
 else c.innerHTML=({overview,hospitals,payers,method}[v]||overview)();
 window.scrollTo(0,0);
}
window.addEventListener('hashchange',route);route();
document.addEventListener('click',function(e){var r=document.getElementById('rolo');if(r&&!r.contains(e.target))r.classList.remove('open');});
</script></body></html>
